                  <button onClick={sendWhisper} disabled={!whisperText.trim()} className="mt-2 rounded bg-amber-500 px-3 py-2 text-xs font-black text-white disabled:opacity-40">Notu Gönder</button>
                </div>
              )}
              <textarea disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} value={draft} onChange={(event) => setDraft(event.target.value)} placeholder="Sosyal medya yanıtı yazın..." className="h-24 w-full resize-none rounded-lg border border-slate-200 bg-white p-3 text-sm outline-none focus:border-indigo-500 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100"></textarea>
              <div className="mt-3 flex items-center justify-between">
                <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openTemplateModal((text, append) => setDraft(prev => append ? `${prev}${prev ? '\n\n' : ''}${text}` : text))} className="rounded-lg border border-slate-200 px-3 py-2 text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:text-slate-300">Şablonlar</button>
                <div className="flex items-center gap-2">
                  <select disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} value={action} onChange={(event) => handleActionChange(event.target.value)} className="h-9 rounded-lg border border-slate-200 bg-white px-3 text-xs font-bold disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100">
                    <option value="">Aksiyon seç</option>
                    <option value="resolve">Çözümle ve Kapat</option>
                    <option value="contact">İletişim Bilgisi İste</option>
                    <option value="link">Talebi İlişkilendir</option>
                    <option value="forward">Gruba Yönlendir</option>
                    <option value="hold">Beklet</option>
                  </select>
                  <button disabled={!action || readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={applyAction} className="h-9 rounded-lg bg-slate-800 px-3 text-xs font-black text-white disabled:opacity-40">Uygula</button>
                  <button onClick={sendSocial} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} disabled={!draft.trim() || readOnly} className="flex h-9 items-center gap-2 rounded-lg bg-indigo-600 px-4 text-xs font-black text-white disabled:opacity-40"><Icon icon={Send} size={15} />Gönder</button>
                </div>
              </div>
            </div>
          </section>

          <ToolsPanel
            customer={customer}
            socialContext
            onInsertKnowledge={(text, title) => { setExternalInsert({ id: generateId('kb-social'), text }); addAudit('Bilgi bankası konuşmaya eklendi', active.id, 'social', title); }}
            activeTopic={active.topic}
            openTickets={getOpenTicketsForCustomer(customer.id)}
            recentTickets={getRecentTicketsForCustomer(customer.id)}
            onNavigateTicket={onNavigateTicket}
            onRequestBalance={onRequestBalance}
            balanceApproved={Boolean(balanceApprovals[customer.id])}
            onPrefillFromHistory={(text) => setExternalInsert({ id: generateId('history-social'), text })}
            activeItem={active}
            onOpenCustomerTab={onOpenCustomerTab}
            agents={agents}
            now={now}
            knowledgeArticles={knowledgeArticles}
          />
        </div>
      );
    }

    // ═══ COMPONENT: TELEFON / ALOTECH EKRANI ═══
    function PhoneModule({
      calls,
      setCalls,
      activeId,
      setActiveId,
      now,
      openResolve,
      openEscalate,
      openForward,
      openLink,
      addAudit,
      getOpenTicketsForCustomer,
      getRecentTicketsForCustomer,
      onNavigateTicket,
      onRequestBalance,
      balanceApprovals,
      currentRole,
      currentAgent,
      agents = [],
      viewingAgent,
      onOpenCustomerTab,
      knowledgeArticles = KNOWLEDGE_ARTICLES
    }) {
      const [leftTab, setLeftTab] = useState('dial');
      const [agentFilter, setAgentFilter] = useState('all');
      const [dialNumber, setDialNumber] = useState('');
      const [muted, setMuted] = useState(false);
      const [note, setNote] = useState('');
      const [transferDept, setTransferDept] = useState('Fraud');
      const [acw, setAcw] = useState(null);
      const [externalInsert, setExternalInsert] = useState(null);
      const effectiveAgentId = viewingAgent?.id || currentAgent.id;
      const readOnly = Boolean(viewingAgent);
      const visibleCalls = calls.filter(call => {
        if (viewingAgent) return call.assignedTo === viewingAgent.id;
        if (currentRole === 'agent') return call.assignedTo === currentAgent.id;
        if (agentFilter === 'mine') return call.assignedTo === currentAgent.id;
        if (agentFilter !== 'all') return call.assignedTo === Number(agentFilter);
        return true;
      });
      const liveCall = visibleCalls.find(call => ['active', 'dialing'].includes(call.status) && !call.endedAt);
      const selectedCall = visibleCalls.find(call => call.id === activeId) || visibleCalls[0];
      const active = liveCall || selectedCall;
      const customer = active ? getCallCustomer(active) : null;
      const missedCall = visibleCalls.find(call => call.status === 'missed');
      const completedCalls = visibleCalls.filter(call => call.status === 'completed' && call.startedAt && call.endedAt);
      const avgTalk = completedCalls.length ? Math.floor(completedCalls.reduce((sum, call) => sum + (call.endedAt - call.startedAt) / 1000, 0) / completedCalls.length) : 0;
      const answerRate = visibleCalls.length ? Math.round((visibleCalls.filter(call => call.status !== 'missed').length / visibleCalls.length) * 100) : 100;

      useEffect(() => {
        if (externalInsert?.id) {
          setNote(prev => `${prev}${prev ? '\n\n' : ''}${externalInsert.text}`);
          setExternalInsert(null);
        }
      }, [externalInsert]);

      useEffect(() => {
        if (!active) return;
        setNote(active.note || '');
        setMuted(false);
      }, [active?.id]);

      useEffect(() => {
        if (!acw) return;
        const remaining = 60 - Math.floor((Date.now() - acw.startedAt) / 1000);
        if (remaining <= 0) {
          setAcw(null);
          addAudit('ACW tamamlandı', acw.callId, 'phone', 'Durum Hazır olarak güncellendi');
        }
      }, [now, acw]);

      const startOutbound = () => {
        if (readOnly) return;
        const digits = normalizePhone(dialNumber).slice(-10);
        if (digits.length < 10) return;
        const phone = `+90${digits}`;
        const matched = findCustomerByPhone(phone);
        const id = generateId('ca-out');
        const call = {
          id,
          customerId: matched?.id || null,
          status: 'dialing',
          priority: 'normal',
          startedAt: Date.now(),
          createdAt: Date.now(),
          direction: 'Giden',
          phone,
          subject: matched ? `${matched.name} dış arama` : 'Bilinmeyen numara dış arama',
          topic: 'Genel',
          assignedTo: currentAgent.id,
          note: '',
          messages: []
        };
        setCalls(prev => [call, ...prev]);
        setActiveId(id);
        addAudit('Dış arama başlatıldı', id, 'phone', formatPhone(phone));
        window.setTimeout(() => {
          setCalls(prev => prev.map(row => row.id === id ? { ...row, status: 'active', connectedAt: Date.now() } : row));
          addAudit('Dış arama bağlandı', id, 'phone', matched?.name || formatPhone(phone));
        }, 2000);
      };

      const endCall = (callId = active?.id) => {
        if (readOnly) return;
        if (!callId) return;
        const internalNote = note.trim();
        setCalls(prev => prev.map(call => {
          if (call.id !== callId) return call;
          const noteMessage = internalNote ? { id: generateId('call-note'), sender: 'note', time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }), text: internalNote, agentName: currentAgent.name, agentAvatar: currentAgent.avatar || getInitials(currentAgent.name) } : null;
          return { ...call, status: 'completed', endedAt: Date.now(), note: internalNote, holdStartedAt: null, messages: noteMessage ? [...(call.messages || []), noteMessage] : call.messages };
        }));
        setAcw({ callId, startedAt: Date.now() });
        addAudit('Çağrı sonlandırıldı', callId, 'phone', internalNote || 'Çağrı notu girilmedi');
      };

      const toggleHold = () => {
        if (readOnly) return;
        if (!active?.id) return;
        setCalls(prev => prev.map(call => {
          if (call.id !== active.id) return call;
          if (call.holdStartedAt) {
            const total = (call.totalHoldSeconds || 0) + Math.floor((Date.now() - call.holdStartedAt) / 1000);
            return { ...call, holdStartedAt: null, totalHoldSeconds: total };
          }
          return { ...call, holdStartedAt: Date.now() };
        }));
        addAudit(active.holdStartedAt ? 'Çağrı beklemeden alındı' : 'Çağrı beklemeye alındı', active.id, 'phone', customer?.name || active.phone);
      };

      const acwRemaining = acw ? Math.max(0, 60 - Math.floor((now - acw.startedAt) / 1000)) : 0;
      const elapsed = active?.startedAt ? Math.floor((now - active.startedAt) / 1000) : 0;
      const holdElapsed = active?.holdStartedAt ? Math.floor((now - active.holdStartedAt) / 1000) : 0;
      const dialDigits = normalizePhone(dialNumber).replace(/^90/, '').replace(/^0/, '').slice(0, 10);

      return (
        <div className="flex h-full min-w-0">
          <section className="flex w-64 shrink-0 flex-col border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">
            <div className="border-b border-slate-200 p-3 dark:border-slate-800">
              <div className="grid grid-cols-2 gap-1 rounded-lg bg-slate-100 p-1 dark:bg-slate-900">
                <button onClick={() => setLeftTab('dial')} className={cx('rounded-md px-3 py-2 text-xs font-black', leftTab === 'dial' ? 'bg-white text-indigo-600 shadow-sm dark:bg-slate-800 dark:text-indigo-300' : 'text-slate-500')}>Çevir</button>
                <button onClick={() => setLeftTab('history')} className={cx('rounded-md px-3 py-2 text-xs font-black', leftTab === 'history' ? 'bg-white text-indigo-600 shadow-sm dark:bg-slate-800 dark:text-indigo-300' : 'text-slate-500')}>Çağrı Geçmişi</button>
              </div>
              {currentRole === 'manager' && !viewingAgent && (
                <div className="mt-3 flex flex-wrap gap-1">
                  {[{ id: 'all', label: 'Tümü' }, { id: 'mine', label: 'Benim' }, ...agents.map(agent => ({ id: String(agent.id), label: agent.name }))].map(option => (
                    <button key={option.id} onClick={() => setAgentFilter(option.id)} className={cx('rounded-full px-2 py-1 text-[10px] font-black', agentFilter === option.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 dark:bg-slate-900 dark:text-slate-300')}>{option.label}</button>
                  ))}
                </div>
              )}
            </div>
            <div className="flex-1 overflow-y-auto p-4 no-scrollbar">
              {leftTab === 'dial' ? (
                <div className="space-y-4">
                  <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 dark:border-slate-800 dark:bg-slate-900">
                    <div className="text-[11px] font-black text-slate-400">Ülke kodu +90</div>
                    <input disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} value={/[\*#]/.test(dialNumber) ? `+90 ${dialNumber}` : formatPhone(`+90${dialDigits}`)} onChange={(event) => setDialNumber(event.target.value)} className="mt-1 h-11 w-full bg-transparent text-xl font-black text-slate-900 outline-none disabled:cursor-not-allowed disabled:opacity-50 dark:text-white" />
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    {['1','2','3','4','5','6','7','8','9','*','0','#'].map(key => (
                      <button key={key} disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => setDialNumber(prev => `${prev}${key}`)} className="h-12 rounded-xl border border-slate-200 bg-white text-lg font-black text-slate-800 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100 dark:hover:bg-slate-800">{key}</button>
                    ))}
                  </div>
                  <div className="grid grid-cols-[1fr_1fr] gap-2">
                    <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => setDialNumber(prev => prev.slice(0, -1))} className="rounded-xl border border-slate-200 px-3 py-3 text-xs font-black text-slate-600 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:text-slate-300 dark:hover:bg-slate-900">Temizle</button>
                    <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={startOutbound} className="flex items-center justify-center gap-2 rounded-xl bg-emerald-600 px-3 py-3 text-xs font-black text-white disabled:cursor-not-allowed disabled:opacity-50"><Icon icon={PhoneCall} size={16} />Ara</button>
                  </div>
                </div>
              ) : (
                <div className="space-y-2">
                  {visibleCalls.map(call => {
                    const rowCustomer = getCallCustomer(call);
                    const isMissed = call.status === 'missed';
                    const isOutgoing = call.direction === 'Giden';
                    const icon = isMissed ? PhoneOff : isOutgoing ? PhoneOutgoing : PhoneIncoming;
                    const tone = isMissed ? 'text-red-600 bg-red-50 dark:bg-red-950 dark:text-red-200' : isOutgoing ? 'text-indigo-600 bg-indigo-50 dark:bg-indigo-950 dark:text-indigo-200' : 'text-emerald-600 bg-emerald-50 dark:bg-emerald-950 dark:text-emerald-200';
                    const duration = call.startedAt && call.endedAt ? formatClock(Math.floor((call.endedAt - call.startedAt) / 1000)) : call.status === 'active' ? formatClock(Math.floor((now - call.startedAt) / 1000)) : '--:--';
                    const status = ticketStatusMeta[call.status] || ticketStatusMeta.waiting;
                    return (
                      <button key={call.id} onClick={() => { setDialNumber(call.phone || rowCustomer.phone); setActiveId(call.id); setLeftTab('dial'); }} className="grid w-full grid-cols-[32px_1fr] gap-2 rounded-xl border border-slate-200 p-2 text-left hover:bg-slate-50 dark:border-slate-800 dark:hover:bg-slate-900">
                        <span className={`flex h-8 w-8 items-center justify-center rounded-lg ${tone}`}><Icon icon={icon} size={15} /></span>
                        <span className="min-w-0">
                          <span className="flex items-center justify-between gap-2">
                            <span className="flex min-w-0 items-center gap-1.5">
                              <span data-customer-tab={rowCustomer.id} onClick={(event) => { event.stopPropagation(); onOpenCustomerTab?.(rowCustomer.id); }} className="truncate text-xs font-black text-slate-900 underline-offset-2 hover:text-indigo-600 hover:underline dark:text-white dark:hover:text-indigo-300">{maskName(rowCustomer.name)}</span>
                              <CustomerTierBadge customer={rowCustomer} />
                            </span>
                            <span className="text-[10px] text-slate-400">{new Date(call.createdAt).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })}</span>
                          </span>
                          <span className="mt-1 flex items-center justify-between gap-2">
                            <span className="text-[11px] text-slate-500 dark:text-slate-400">{duration}</span>
                            <span className={`rounded-full px-1.5 py-0.5 text-[10px] font-black ${status.badge}`}>{status.label}</span>
                          </span>
                        </span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
            <div className="border-t border-slate-200 p-3 dark:border-slate-800">
              <div className="grid grid-cols-2 gap-2 text-center">
                <div className="rounded-lg bg-slate-50 p-2 dark:bg-slate-900"><div className="text-sm font-black text-slate-900 dark:text-white">{visibleCalls.length}</div><div className="text-[10px] font-bold text-slate-400">Toplam Çağrı</div></div>
                <div className="rounded-lg bg-slate-50 p-2 dark:bg-slate-900"><div className="text-sm font-black text-slate-900 dark:text-white">{formatClock(avgTalk)}</div><div className="text-[10px] font-bold text-slate-400">Ort. Konuşma</div></div>
                <div className="rounded-lg bg-slate-50 p-2 dark:bg-slate-900"><div className="text-sm font-black text-slate-900 dark:text-white">%{answerRate}</div><div className="text-[10px] font-bold text-slate-400">Cevaplama</div></div>
                <div className="rounded-lg bg-slate-50 p-2 dark:bg-slate-900"><div className="text-sm font-black text-slate-900 dark:text-white">38 sn</div><div className="text-[10px] font-bold text-slate-400">ACW</div></div>
              </div>
            </div>
          </section>

          <section className="flex min-w-0 flex-1 flex-col bg-slate-50 dark:bg-slate-950">
            <div className="flex-1 overflow-y-auto p-6 no-scrollbar">
              {acw ? (
                <div className="mx-auto flex h-full max-w-3xl flex-col items-center justify-center text-center">
                  <div className="mb-5 rounded-2xl border border-indigo-200 bg-white px-8 py-5 text-5xl font-black text-indigo-600 shadow-soft dark:border-indigo-800 dark:bg-slate-900 dark:text-indigo-300">{formatClock(acwRemaining)}</div>
                  <h2 className="text-xl font-black text-slate-900 dark:text-white">Çağrı Sonrası Çalışma</h2>
                  <div className="mt-5 flex items-center gap-3">
                    <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openResolve(active, 'phone')} className="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-black text-white disabled:cursor-not-allowed disabled:opacity-50">Çözümle ve Kapat</button>
                    <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openEscalate(active, 'phone')} className="rounded-lg bg-red-600 px-4 py-2 text-sm font-black text-white disabled:cursor-not-allowed disabled:opacity-50">Eskale Et</button>
                    <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openForward(active, 'phone')} className="rounded-lg bg-slate-800 px-4 py-2 text-sm font-black text-white disabled:cursor-not-allowed disabled:opacity-50">Gruba Yönlendir</button>
                    <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openLink?.(active, 'phone')} className="rounded-lg border border-indigo-200 bg-indigo-50 px-4 py-2 text-sm font-black text-indigo-700 disabled:cursor-not-allowed disabled:opacity-50 dark:border-indigo-800 dark:bg-indigo-950/40 dark:text-indigo-200">Talebi İlişkilendir</button>
                  </div>
                </div>
              ) : liveCall ? (
                <div className="mx-auto max-w-4xl">
                  <div className="rounded-2xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-4">
                        <div className="flex h-12 w-12 items-center justify-center rounded-full bg-indigo-600 text-sm font-black text-white">{customer.avatar}</div>
                        <div>
                          <div className="flex items-center gap-3">
                            <a href={`#customer-${customer.id}`} data-customer-tab={customer.id} className="text-left text-xl font-black text-slate-900 underline-offset-4 hover:text-indigo-600 hover:underline dark:text-white dark:hover:text-indigo-300">{maskName(customer.name)}</a>
                            <CustomerTierBadge customer={customer} compact={false} />
                            {liveCall.status === 'active' ? <span className="call-pulse rounded-full bg-emerald-500 px-3 py-1 text-xs font-black text-white">CANLI</span> : <span className="rounded-full bg-indigo-600 px-3 py-1 text-xs font-black text-white">ARANIYOR</span>}
                          </div>
                          <div className="mt-1 text-sm text-slate-500 dark:text-slate-400">{liveCall.status === 'dialing' ? `Aranıyor: ${formatPhone(liveCall.phone)}` : `${customer.userId} · ${formatPhone(liveCall.phone || customer.phone)}`}</div>
                        </div>
                      </div>
                      <div className="text-5xl font-black tabular-nums text-slate-900 dark:text-white">{formatClock(elapsed)}</div>
                    </div>
                    {liveCall.holdStartedAt && <div className="mt-5 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm font-black text-amber-800 dark:border-amber-800 dark:bg-amber-950/50 dark:text-amber-100">BEKLEME: {formatClock(holdElapsed)}</div>}
                    {customer.id === 'unknown' && <div className="mt-5 rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-950"><div className="text-sm font-black text-slate-900 dark:text-white">Bilinmeyen Numara</div><button className="mt-2 rounded-lg bg-indigo-600 px-3 py-2 text-xs font-black text-white">Müşteri Ara</button></div>}
                    <div className="mt-6 grid grid-cols-5 gap-3">
                      <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => setMuted(!muted)} className={cx('flex items-center justify-center gap-2 rounded-xl px-4 py-3 text-sm font-black disabled:cursor-not-allowed disabled:opacity-50', muted ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-100')}><Icon icon={muted ? MicOff : Mic} size={18} />Sessiz</button>
                      <button onClick={toggleHold} disabled={liveCall.status !== 'active' || readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} className="flex items-center justify-center gap-2 rounded-xl bg-amber-500 px-4 py-3 text-sm font-black text-white disabled:cursor-not-allowed disabled:opacity-50"><Icon icon={liveCall.holdStartedAt ? Play : Pause} size={18} />Beklet</button>
                      <div className="flex rounded-xl bg-slate-800 text-white">
                        <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openForward(liveCall, 'phone')} className="flex flex-1 items-center justify-center gap-2 px-2 text-sm font-black disabled:cursor-not-allowed disabled:opacity-50"><Icon icon={UserPlus} size={18} />Aktar</button>
                        <select disabled={readOnly} value={transferDept} onChange={(event) => setTransferDept(event.target.value)} className="w-24 rounded-r-xl bg-slate-700 px-1 text-xs outline-none disabled:opacity-50">{Object.keys(DEPARTMENTS).map(dep => <option key={dep}>{dep}</option>)}</select>
                      </div>
                      <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openLink?.(liveCall, 'phone')} className="flex items-center justify-center gap-2 rounded-xl border border-indigo-200 bg-indigo-50 px-4 py-3 text-sm font-black text-indigo-700 disabled:cursor-not-allowed disabled:opacity-50 dark:border-indigo-800 dark:bg-indigo-950/40 dark:text-indigo-200"><Icon icon={Link} size={18} />İlişkilendir</button>
                      <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => endCall(liveCall.id)} className="flex items-center justify-center gap-2 rounded-xl bg-red-600 px-4 py-3 text-sm font-black text-white disabled:cursor-not-allowed disabled:opacity-50"><Icon icon={PhoneOff} size={18} />Sonlandır</button>
                    </div>
                  </div>
                  <div className="mt-5 rounded-2xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
                    <div className="mb-2 text-sm font-black text-slate-900 dark:text-white">Çağrı Notu</div>
                    <textarea disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} value={note} onChange={(event) => setNote(event.target.value)} placeholder="Çağrı sırasında alınan notlar..." className="h-36 w-full resize-none rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm outline-none focus:border-indigo-500 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100"></textarea>

    function QualityArchive({ emails, chats, social, calls = [], agents, currentAgent = null, mode = 'manager' }) {
      const closedStatuses = ['resolved', 'completed'];
      const ongoingStatuses = ['escalated', 'hold', 'waiting'];
      const isAgentArchive = mode === 'agent';
      const agentScopeId = currentAgent?.id ? String(currentAgent.id) : null;
      const agentScopeName = currentAgent?.name || '';
      const [recordScope, setRecordScope] = useState(isAgentArchive ? 'all' : 'closed');
      const [filterType, setFilterType] = useState('all');
      const [filterAgent, setFilterAgent] = useState('all');
      const [filterTeam, setFilterTeam] = useState('all');
      const [dateFilter, setDateFilter] = useState(isAgentArchive ? 'today' : 'week');
      const [customStart, setCustomStart] = useState('');
      const [customEnd, setCustomEnd] = useState('');
      const [archiveSearch, setArchiveSearch] = useState('');
      const [selectedKey, setSelectedKey] = useState(null);
      const parseArchiveDate = (value) => {
        if (typeof value === 'number') return value;
        const match = String(value || '').match(/^(\d{2})\.(\d{2})\.(\d{4})(?:\s+(\d{2}):(\d{2}))?/);
        if (match) return new Date(Number(match[3]), Number(match[2]) - 1, Number(match[1]), Number(match[4] || 0), Number(match[5] || 0)).getTime();
        return Date.parse(value) || 0;
      };
      const archiveDateRange = useMemo(() => {
        const today = new Date();
        const startOfDay = (date) => new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
        const endOfDay = (date) => new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 59, 999).getTime();
        if (dateFilter === 'all') return null;
        if (dateFilter === 'today') return { start: startOfDay(today), end: endOfDay(today) };
        if (dateFilter === 'yesterday') {
          const yesterday = new Date(today);
          yesterday.setDate(today.getDate() - 1);
          return { start: startOfDay(yesterday), end: endOfDay(yesterday) };
        }
        if (dateFilter === 'week') {
          const start = new Date(today);
          const day = (today.getDay() + 6) % 7;
          start.setDate(today.getDate() - day);
          return { start: startOfDay(start), end: endOfDay(today) };
        }
        if (dateFilter === 'month') return { start: new Date(today.getFullYear(), today.getMonth(), 1).getTime(), end: endOfDay(today) };
        if (dateFilter === 'quarter') {
          const quarterStart = Math.floor(today.getMonth() / 3) * 3;
          return { start: new Date(today.getFullYear(), quarterStart, 1).getTime(), end: endOfDay(today) };
        }
        if (dateFilter === 'custom' && customStart && customEnd) {
          return { start: new Date(`${customStart}T00:00:00`).getTime(), end: new Date(`${customEnd}T23:59:59`).getTime() };
        }
        return null;
      }, [dateFilter, customStart, customEnd]);
      const records = useMemo(() => {
        const inferEscalationDepartment = (record) => {
          const text = `${record.subject || ''} ${record.category || ''} ${record.subcategory || ''} ${record.note || ''}`.toLocaleLowerCase('tr-TR');
          if (/hukuk|dava|avukat|savcılık|şikayet/.test(text)) return 'Hukuk';
          if (/fraud|kyc|2fa|güvenlik|şüpheli|kimlik|cihaz/.test(text)) return 'Fraud';
          if (/api|rate|teknik|yazılım|grafik|uygulama/.test(text)) return 'Yazılım';
          return 'Finans';
        };
        const buildEscalationInfo = (item, record, agent, sortTime) => {
          if (item.status !== 'escalated' && !item.escalation) return null;
          const data = item.escalation || {};
          const eventTime = data.at || data.date || item.escalatedAt || sortTime;
          const department = data.department || item.escalationDepartment || inferEscalationDepartment(record);
          return {
            department,
            priority: data.priority || (item.priority === 'urgent' ? 'Çok Acil' : item.priority === 'high' ? 'Acil' : 'Normal'),
            note: data.note || record.note || 'Eskalasyon gerekçesi kayda eklenmemiş.',
            agent: data.agent || record.agentName || agent?.name || 'Atanmamış',
            category: data.category || record.category || record.subject,
            subject: data.subject || record.subject,
            dateLabel: data.dateLabel || new Date(eventTime).toLocaleString('tr-TR')
          };
        };
        const buildHoldInfo = (item, record, agent, sortTime) => {
          if (!['hold', 'waiting'].includes(item.status)) return null;
          const eventTime = item.holdStartedAt || item.forwardedAt || sortTime;
          return {
            reason: item.holdReason || item.forwardNote || record.note || 'Bekletme gerekçesi kayda eklenmemiş.',
            followUp: item.holdFollowUp || (item.forwardedGroup ? `${item.forwardedGroup} kuyruğunda` : 'Takip zamanı belirtilmemiş'),
            agent: item.holdAgent || item.forwardedBy || record.agentName || agent?.name || 'Atanmamış',
            dateLabel: new Date(eventTime).toLocaleString('tr-TR')
          };
        };
        const enrichArchiveMessages = (record, sourceMessages = []) => {
          const normalized = (sourceMessages || []).filter(Boolean).map((message, index) => ({
            id: message.id || `${record.key}-msg-${index}`,
            sender: message.sender === 'user' ? 'customer' : message.sender,
            time: message.time || message.date || ['09:02', '09:06', '09:11', '09:18', '09:24'][index] || '--:--',
            text: message.text || ''
          }));
          const customerFirstName = (record.customerName || 'Müşterimiz').split(' ')[0];
          const originalCustomerText = normalized.find(message => message.sender === 'customer')?.text || `${record.subject} konusunda destek almak istiyorum.`;
          const isSocial = record.type === 'social';
          const isEmail = record.type === 'email';
          const actionNoteLabel = record.csatScore ? 'Kapanış / kalite notu' : record.status === 'escalated' ? 'Eskalasyon / aksiyon notu' : 'Bekletme / takip notu';
          if (!isSocial && !isEmail && normalized.length >= 7) return normalized;
          const detailAskByCategory = record.category?.includes('Kripto') || record.subcategory?.includes('Transfer')
            ? 'TxID/hash, ağ bilgisi ve işlem saatini kontrol edebilmem için paylaşmanızı rica ederim.'
            : record.category?.includes('Güvenlik') || record.subcategory?.includes('KYC')
              ? 'Hesap güvenliği için son giriş cihazı, işlem zamanı ve varsa ekran görüntüsünü kontrol edeceğim.'
              : record.category?.includes('Limit') || record.category?.includes('Komisyon')
                ? 'Hesap seviyenizi, son hacminizi ve aktif komisyon tanımınızı kontrol ediyorum.'
                : 'Talebinize ait kayıtları ve önceki işlem geçmişini kontrol ediyorum.';
          const customerFollowUp = record.category?.includes('Kripto') || record.subcategory?.includes('Transfer')
            ? 'Bilgileri paylaşıyorum, işlem hâlâ beklemede görünüyor.'
            : record.category?.includes('Güvenlik') || record.subcategory?.includes('KYC')
              ? 'Gerekli ekran görüntüsünü ve son giriş bilgisini iletiyorum.'
              : 'Tamam, kontrol için gerekli bilgileri iletiyorum.';
          const finalText = record.status === 'escalated'
            ? `Kontrolleri tamamladım. Talebinizi ${record.escalation?.department || record.category || 'ilgili'} birimine ${record.category || record.subject} başlığıyla aktardım; gelişme olduğunda kayıtlı kanalınızdan bilgilendirme yapılacak.`
            : record.status === 'hold'
              ? `Ön kontrol tamamlandı. Eksik bilgi/operasyon onayı nedeniyle kaydı beklemeye aldım; tamamlandığında aynı kayıt üzerinden dönüş yapılacak.`
              : `Kontrolleri tamamladım. ${record.note || 'Talebiniz için gerekli bilgilendirme yapıldı.'} Yardımcı olabileceğim başka bir konu varsa aynı kanaldan iletebilirsiniz.`;

          if (isEmail) {
            return [
              { id: `${record.key}-email-1`, sender: 'customer', time: '09:02', text: `Konu: ${record.subject}\n\nMerhaba AHL Kripto Destek Ekibi,\n\n${originalCustomerText}\n\nKontrol ederek dönüş yapmanızı rica ederim.\n\nİyi çalışmalar.` },
              { id: `${record.key}-email-2`, sender: 'agent', time: '09:18', text: `Konu: RE: ${record.subject}\n\nMerhaba ${customerFirstName},\n\nAHL Kripto'ya ulaştığınız için teşekkür ederiz. Talebinizi kontrol edebilmemiz için ${detailAskByCategory.charAt(0).toLowerCase()}${detailAskByCategory.slice(1)}\n\nBilgileri iletmeniz halinde kaydınız üzerinden kontrol sağlayacağız.\n\nSaygılarımızla,\n${record.agentName}\nAHL Kripto Müşteri Destek` },
              { id: `${record.key}-email-3`, sender: 'customer', time: '09:46', text: `Merhaba,\n\nİstenen bilgileri iletiyorum. ${customerFollowUp}\n\nTeşekkürler.` },
              { id: `${record.key}-email-4`, sender: 'agent', time: '10:12', text: `Konu: RE: ${record.subject}\n\nMerhaba ${customerFirstName},\n\n${finalText}\n\nFarklı bir talebiniz olması halinde bu e-posta üzerinden veya destek kanallarımızdan bize ulaşabilirsiniz.\n\nSaygılarımızla,\n${record.agentName}\nAHL Kripto Müşteri Destek` },
              { id: `${record.key}-email-5`, sender: 'note', time: '10:14', text: `${actionNoteLabel}: ${record.note || 'E-posta kaydı için aksiyon notu arşive işlendi.'}` }
            ];
          }

    function Reports({ auditLog, agents = [], emails = [], chats = [], social = [], calls = [], announcements = [] }) {
      const [reportTab, setReportTab] = useState('overview');

      const [channelFilter, setChannelFilter] = useState('all');

      const [selectedAnnouncement, setSelectedAnnouncement] = useState(null);
      const now = Date.now();
      const periodOptions = [
        { id: 'today', label: 'Bugün', days: 1 },

        { id: 'month', label: 'Son 30 Gün', days: 30 },
        { id: 'custom', label: 'Belirlenen Aralık', days: null },
        { id: 'all', label: 'Tüm Zamanlar', days: null }
      ];
      const reportPalette = ['#4f46e5', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#0ea5e9', '#ef4444'];
      const toneMeta = {
        indigo: { hex: '#4f46e5', soft: 'bg-indigo-50 text-indigo-700 border-indigo-200 dark:bg-indigo-950/40 dark:text-indigo-200 dark:border-indigo-800' },
        emerald: { hex: '#10b981', soft: 'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-950/40 dark:text-emerald-200 dark:border-emerald-800' },
        amber: { hex: '#f59e0b', soft: 'bg-amber-50 text-amber-700 border-amber-200 dark:bg-amber-950/40 dark:text-amber-200 dark:border-amber-800' },
        red: { hex: '#ef4444', soft: 'bg-red-50 text-red-700 border-red-200 dark:bg-red-950/40 dark:text-red-200 dark:border-red-800' },
        blue: { hex: '#0ea5e9', soft: 'bg-blue-50 text-blue-700 border-blue-200 dark:bg-blue-950/40 dark:text-blue-200 dark:border-blue-800' },
        violet: { hex: '#8b5cf6', soft: 'bg-violet-50 text-violet-700 border-violet-200 dark:bg-violet-950/40 dark:text-violet-200 dark:border-violet-800' }
      };
      const baseTickets = [
        ...emails.map(item => ({ ...item, _type: 'email', _label: 'E-Posta', _color: 'bg-indigo-600', _hex: '#4f46e5' })),
        ...chats.map(item => ({ ...item, _type: 'live_chat', _label: 'Canlı Destek', _color: 'bg-emerald-500', _hex: '#10b981' })),
        ...social.map(item => ({ ...item, _type: 'social', _label: 'Sosyal Medya', _color: 'bg-violet-500', _hex: '#8b5cf6' })),
        ...calls.map(item => ({ ...item, _type: 'phone', _label: 'Telefon', _color: 'bg-amber-500', _hex: '#f59e0b' }))
      ];
      const categories = ['all', ...Array.from(new Set(baseTickets.map(item => item.category || item.topic || item._label)))];
      const scopedAgents = agents.filter(agent => {
        if (reportScope === 'team') return agent.team === reportTeam;
        if (reportScope === 'agent') return agent.id === Number(reportAgent);
        return true;
      });
      const scopedAgentIds = new Set(scopedAgents.map(agent => agent.id));
      const periodDays = periodOptions.find(item => item.id === period)?.days;
      const periodRange = (() => {
        if (period === 'all') return null;
        if (period === 'custom') {
          if (!customStart || !customEnd) return null;
          return {
            start: new Date(`${customStart}T00:00:00`).getTime(),
            end: new Date(`${customEnd}T23:59:59`).getTime()
          };
        }
        if (periodDays) return { start: now - periodDays * 24 * 60 * 60 * 1000, end: now };
        return null;
      })();
      const tickets = baseTickets.filter(item => {
        if (!scopedAgentIds.has(item.assignedTo)) return false;
        if (periodRange && (item.createdAt < periodRange.start || item.createdAt > periodRange.end)) return false;
        if (channelFilter !== 'all' && item._type !== channelFilter) return false;
        const category = item.category || item.topic || item._label;
        if (categoryFilter !== 'all' && category !== categoryFilter) return false;
        return true;
      });
      const total = tickets.length;
      const closedTickets = tickets.filter(item => ['resolved', 'completed'].includes(item.status));
      const openTickets = tickets.filter(item => ['active', 'hold', 'waiting', 'ringing', 'dialing'].includes(item.status));
      const escalatedTickets = tickets.filter(item => item.status === 'escalated');
      const slaTickets = tickets.filter(item => item._type !== 'phone');
      const onTimeTickets = slaTickets.filter(item => !getSlaInfo(item, item._type, now).expired);
      const pct = (part, whole = total) => whole ? Math.round((part / whole) * 100) : 0;
      const parseCsat = (value) => Number(String(value || '0').split('/')[0].replace(',', '.')) || 0;
      const avg = (values) => values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : 0;
      const formatSec = (seconds) => {
        const safe = Math.max(0, Math.round(seconds || 0));
        if (safe >= 3600) return `${Math.floor(safe / 3600)} sa ${Math.floor((safe % 3600) / 60)} dk`;
        if (safe >= 60) return `${Math.floor(safe / 60)} dk ${safe % 60} sn`;
        return `${safe} sn`;
      };
      const durationFor = (item) => {
        const end = item.resolvedAt || item.endedAt || item.connectedAt || now;
        return Math.max(20, Math.min(14400, Math.floor((end - item.createdAt) / 1000)));
      };
      const firstResponseFor = (item) => ({ email: 920, live_chat: 42, social: 680, phone: 18 }[item._type] || 240);
      const avgResolution = avg(closedTickets.map(durationFor));
      const avgFirstResponse = avg(tickets.map(firstResponseFor));
      const fcrCount = closedTickets.filter(item => !(item.escalationCount > 0) && item.status !== 'escalated').length;
      const avgCsat = avg(scopedAgents.map(agent => parseCsat(agent.csat)).filter(Boolean));
      const slaPct = pct(onTimeTickets.length, slaTickets.length);
      const fcrPct = pct(fcrCount, closedTickets.length);
      const escalationPct = pct(escalatedTickets.length);
      const scopeLabel = (reportScope === 'team' ? reportTeam : reportScope === 'agent' ? agents.find(agent => agent.id === Number(reportAgent))?.name : 'Tüm temsilciler') || 'Seçili kapsam';
      const periodLabel = period === 'custom' && customStart && customEnd ? `${new Date(customStart).toLocaleDateString('tr-TR')} - ${new Date(customEnd).toLocaleDateString('tr-TR')}` : periodOptions.find(item => item.id === period)?.label;
      const tabItems = [
        { id: 'overview', label: 'Genel Özet', icon: LayoutDashboard },

      ];
      const channelRows = ['email', 'live_chat', 'phone', 'social'].map(type => {
        const sample = baseTickets.find(item => item._type === type);

      });
      const maxChannel = Math.max(1, ...channelRows.map(row => row.count));
      const categoryRows = Object.entries(tickets.reduce((acc, item) => {
        const key = item.category || item.topic || item._label;
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {})).map(([label, count], index) => ({ label, count, hex: reportPalette[index % reportPalette.length] })).sort((a, b) => b.count - a.count);
      const maxCategory = Math.max(1, ...categoryRows.map(row => row.count));
      const trendDays = Array.from({ length: 7 }, (_, index) => {
        const date = new Date(now - (6 - index) * 24 * 60 * 60 * 1000);
        const start = new Date(date); start.setHours(0, 0, 0, 0);

        const byChannel = channelRows.map(row => ({ type: row.type, label: row.label, color: row.hex, value: dayTickets.filter(item => item._type === row.type).length }));
        return { label: date.toLocaleDateString('tr-TR', { weekday: 'short' }), value: dayTickets.length, byChannel };
      });
      const qualityScore = Math.round((fcrPct * 0.4) + (slaPct * 0.3) + ((avgCsat / 5) * 100 * 0.3));
      const riskAlerts = [
        slaPct < 90 && { level: 'critical', title: 'SLA hedefin altında', text: `Seçili kapsamda zamanında karşılama oranı %${slaPct}. Hedef en az %90 olduğu için kuyruk ve kapasite kontrolü önerilir.` },
        escalationPct > 10 && { level: 'warning', title: 'Eskalasyon oranı yükseldi', text: `Taleplerin %${escalationPct} kadarı başka birime taşınmış. İlk hatta çözüm bilgisi veya yetki eksikliği incelenmeli.` },
        openTickets.length > closedTickets.length && { level: 'warning', title: 'Açık iş yükü kapanan işten fazla', text: `${openTickets.length} açık kayıt var. Temsilci dağılımı ve bekleyen talepler önceliklendirilmeli.` },
        avgCsat && avgCsat < 4.3 && { level: 'critical', title: 'Müşteri memnuniyeti düşük', text: `Ortalama memnuniyet ${avgCsat.toFixed(2)}/5. Şikayet ve sosyal medya kayıtları kalite ekibiyle incelenmeli.` },
        tickets.filter(item => item.priority === 'urgent').length > 0 && { level: 'warning', title: 'Acil öncelikli kayıt var', text: `${tickets.filter(item => item.priority === 'urgent').length} kayıt acil öncelikte. SLA ihlali oluşmadan takip edilmeli.` }
      ].filter(Boolean);
      const unreadAnnouncementCount = announcements.reduce((sum, announcement) => sum + getAnnouncementAudience(announcement, agents).unread.length, 0);
      const activeSlaBreaches = slaTickets.filter(item => getSlaInfo(item, item._type, now).expired);
      const busiestChannel = channelRows.slice().sort((left, right) => right.count - left.count)[0];
      const kpiAlarms = [
        {

        setSelectedAnnouncement(announcement);
        if (!isAnnouncementRead(announcement, currentAgent.id)) markAnnouncementRead?.(announcement.id);
      };
      return (
        <div className="h-full overflow-y-auto bg-slate-100 p-6 no-scrollbar dark:bg-slate-950">
          <div className="grid grid-cols-3 gap-5">
            {announcements.map(announcement => {
              const tone = announcement.type === 'critical' ? 'border-red-200 bg-red-50 text-red-800 dark:border-red-800 dark:bg-red-950/40 dark:text-red-100' : announcement.type === 'warning' ? 'border-amber-200 bg-amber-50 text-amber-800 dark:border-amber-800 dark:bg-amber-950/40 dark:text-amber-100' : 'border-indigo-200 bg-indigo-50 text-indigo-800 dark:border-indigo-800 dark:bg-indigo-950/40 dark:text-indigo-100';
              const read = isAnnouncementRead(announcement, currentAgent.id);
              return (
                <div key={announcement.id} className={`rounded-2xl border p-5 shadow-soft ${tone}`}>
                  <div className="mb-3 flex items-center justify-between">
                    <span className="rounded-full bg-white/70 px-2 py-1 text-[11px] font-black uppercase dark:bg-slate-950/50">{announcement.type === 'critical' ? 'Kritik' : announcement.type === 'warning' ? 'Uyarı' : 'Bilgi'}</span>
                    <span className="text-xs font-bold opacity-70">{announcement.time}</span>
                  </div>
                  <h3 className="text-base font-black">{announcement.title}</h3>
                  <p className="mt-2 text-sm leading-6 opacity-85">{announcement.body}</p>
                  <div className="mt-4 flex items-center justify-between gap-3">
                    <button onClick={() => openAnnouncement(announcement)} className="rounded-lg bg-white px-3 py-2 text-xs font-black text-slate-800 hover:bg-white/80 dark:bg-slate-950 dark:text-slate-100 dark:hover:bg-slate-900">Duyuruyu Aç</button>
                    {read ? <div className="flex items-center gap-2 text-xs font-black opacity-70"><Icon icon={Check} size={14} />Okundu</div> : <span className="rounded-full bg-red-600 px-2 py-1 text-[10px] font-black text-white">Yeni</span>}

              <AnnouncementDetailContent announcement={selectedAnnouncement} agents={agents} showAudience={currentRole === 'manager'} onClose={() => setSelectedAnnouncement(null)} />

    function AnnouncementManagement({ announcements, setAnnouncements, addAudit, agents = [] }) {
      const [type, setType] = useState('info');
      const [title, setTitle] = useState('');
      const [body, setBody] = useState('');
      const [selectedAnnouncement, setSelectedAnnouncement] = useState(null);
      const typeOptions = [
        { id: 'critical', label: 'Kritik', className: 'border-red-200 bg-red-50 text-red-700 dark:border-red-800 dark:bg-red-950/40 dark:text-red-100' },
        { id: 'warning', label: 'Uyarı', className: 'border-amber-200 bg-amber-50 text-amber-700 dark:border-amber-800 dark:bg-amber-950/40 dark:text-amber-100' },
        { id: 'info', label: 'Bilgi', className: 'border-indigo-200 bg-indigo-50 text-indigo-700 dark:border-indigo-800 dark:bg-indigo-950/40 dark:text-indigo-100' }
      ];
      const publish = () => {
        if (!title.trim() || !body.trim()) return;
        const announcement = {
          id: generateId('ann'),
          type,
          title: title.trim(),
          body: body.trim(),
          time: 'az önce',
          readBy: []
        };
        setAnnouncements(prev => [announcement, ...prev]);
        addAudit('Duyuru yayınlandı', announcement.id, 'announcement', announcement.title);
        setTitle('');
        setBody('');
        setType('info');
      };
      const remove = (id) => {
        const target = announcements.find(item => item.id === id);
        setAnnouncements(prev => prev.filter(item => item.id !== id));
        addAudit('Duyuru silindi', id, 'announcement', target?.title || 'Duyuru');
      };

      return (
        <div className="grid h-full grid-cols-[1fr_420px] gap-5 overflow-y-auto bg-slate-100 p-6 no-scrollbar dark:bg-slate-950">
          <section className="rounded-2xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-950">
            <div className="mb-4 flex items-center justify-between">
              <h2 className="text-lg font-black text-slate-900 dark:text-white">Mevcut Duyurular</h2>
              <span className="rounded-full bg-slate-100 px-2 py-1 text-xs font-black text-slate-600 dark:bg-slate-900 dark:text-slate-300">{announcements.length}</span>
            </div>
            <div className="space-y-3">
              {announcements.map(announcement => {
                const option = typeOptions.find(item => item.id === announcement.type) || typeOptions[2];
                return (
                  <div key={announcement.id} className={`rounded-xl border p-4 ${option.className}`}>
                    <div className="mb-2 flex items-start justify-between gap-3">
                      <div>
                        <span className="rounded-full bg-white/70 px-2 py-0.5 text-[10px] font-black uppercase dark:bg-slate-950/50">{option.label}</span>
                        <h3 className="mt-2 text-sm font-black">{announcement.title}</h3>
                      </div>
                      <button onClick={() => remove(announcement.id)} className="rounded-lg p-1.5 hover:bg-white/60 dark:hover:bg-slate-900/60" title="Sil">
                        <Icon icon={X} size={15} />
                      </button>
                    </div>
                    <p className="text-sm leading-6 opacity-85">{announcement.body}</p>
                    <button onClick={() => setSelectedAnnouncement(announcement)} className="mt-3 rounded-lg bg-white/70 px-3 py-2 text-xs font-black text-slate-700 hover:bg-white dark:bg-slate-950/50 dark:text-slate-100 dark:hover:bg-slate-950">Okunma Detayını Aç</button>
                  </div>
                );
              })}
            </div>
          </section>

          <section className="rounded-2xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-950">
            <h2 className="mb-4 text-lg font-black text-slate-900 dark:text-white">Yeni Duyuru Oluştur</h2>
            <div className="space-y-4">
              <div>
                <label className="mb-2 block text-xs font-black text-slate-600 dark:text-slate-300">Tip</label>
                <div className="grid grid-cols-3 gap-2">
                  {typeOptions.map(option => (
                    <button key={option.id} onClick={() => setType(option.id)} className={cx('rounded-xl border px-3 py-2 text-xs font-black', type === option.id ? option.className : 'border-slate-200 bg-slate-50 text-slate-600 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300')}>{option.label}</button>
                  ))}
                </div>
              </div>
              <div>
                <label className="mb-1 block text-xs font-black text-slate-600 dark:text-slate-300">Başlık</label>
                <input value={title} onChange={(event) => setTitle(event.target.value)} className="h-11 w-full rounded-lg border border-slate-200 bg-slate-50 px-3 text-sm outline-none focus:border-indigo-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100" placeholder="Duyuru başlığı" />
              </div>
              <div>
                <label className="mb-1 block text-xs font-black text-slate-600 dark:text-slate-300">Açıklama</label>
                <textarea value={body} onChange={(event) => setBody(event.target.value)} className="h-40 w-full resize-none rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm leading-6 outline-none focus:border-indigo-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100" placeholder="Ekiplerin göreceği açıklama"></textarea>
              </div>
              <button disabled={!title.trim() || !body.trim()} onClick={publish} className="w-full rounded-lg bg-indigo-600 px-4 py-3 text-sm font-black text-white disabled:cursor-not-allowed disabled:opacity-40">Yayınla</button>
            </div>
          </section>
          {selectedAnnouncement && (
            <ModalShell title="Duyuru Okunma Detayı" onClose={() => setSelectedAnnouncement(null)} width="max-w-3xl">
              <AnnouncementDetailContent announcement={selectedAnnouncement} agents={agents} showAudience onClose={() => setSelectedAnnouncement(null)} />
            </ModalShell>
          )}
        </div>
      );
    }

    function TeamManagement({ agents, setAgents, emailItems, chatItems, socialItems, calls, setEmails, setChats, setSocial, setCalls, addAudit, currentAgent }) {
      const [toast, setToast] = useState('');
      const [teamFilter, setTeamFilter] = useState('all');
      const [customProfile, setCustomProfile] = useState(ROUTING_PROFILES['Kişiye Özel']);
      const routingProfiles = useMemo(() => ({ ...ROUTING_PROFILES, 'Kişiye Özel': customProfile }), [customProfile]);
      const scopedAgents = agents.filter(agent => {
        if (teamFilter === 'all') return true;
        if (teamFilter === 'mine') return agent.team === currentAgent.team;
        return agent.team === teamFilter;
      });
      const activeFor = (rows, agentId) => rows.filter(item => item.assignedTo === agentId && !['resolved', 'completed'].includes(item.status)).length;
      const countFor = (agent, channel) => {
        if (channel === 'chat') return activeFor(chatItems, agent.id);
        if (channel === 'email') return activeFor(emailItems, agent.id);
        if (channel === 'phone') return activeFor(calls, agent.id);
        return activeFor(socialItems, agent.id);
      };
      const capacityFor = (agent) => {
        const profile = routingProfiles[agent.routingProfile] || routingProfiles.Dengeli;
        const load = countFor(agent, 'chat') + countFor(agent, 'email') + countFor(agent, 'phone') + countFor(agent, 'social');
        const max = profile.chat + profile.email + profile.phone + profile.social;
        return max ? Math.min(100, Math.round((load / max) * 100)) : 0;
      };
      const changeProfile = (agent, nextProfile) => {
        const previous = agent.routingProfile;
        setAgents(prev => prev.map(row => row.id === agent.id ? { ...row, routingProfile: nextProfile } : row));
        addAudit('Profil değiştirildi', agent.id, 'agent', `${agent.name}: ${previous} → ${nextProfile}`);
      };
      const queueRows = [
        { key: 'email', label: 'E-posta', rows: emailItems, setter: setEmails },
        { key: 'chat', label: 'Canlı Destek', rows: chatItems, setter: setChats },
        { key: 'phone', label: 'Telefon', rows: calls, setter: setCalls },
        { key: 'social', label: 'Sosyal Medya', rows: socialItems, setter: setSocial }
      ];
      const waitingCount = (rows) => rows.filter(item => ['waiting', 'hold', 'ringing'].includes(item.status)).length;
      const distribute = () => {
        let assigned = 0;
        queueRows.forEach(queue => {
          const eligible = scopedAgents.filter(agent => (routingProfiles[agent.routingProfile] || routingProfiles.Dengeli)[queue.key] > 0 && agent.status !== 'offline');
          if (!eligible.length) return;
          queue.setter(prev => prev.map(item => {
            if (!['waiting', 'hold', 'ringing'].includes(item.status)) return item;
            const nextAgent = eligible[(assigned + item.id.length) % eligible.length];
            assigned += 1;
            return { ...item, assignedTo: nextAgent.id };
          }));
        });
        setToast(`${assigned} talep dağıtıldı`);
        addAudit('Otomatik dağıtım', 'routing', 'team', `${assigned} talep müsait temsilcilere dağıtıldı`);
        window.setTimeout(() => setToast(''), 2400);
      };
      const setCustomRoutingPreset = (profile, label) => {
        setCustomProfile(profile);
        setToast(`Kişiye Özel profil güncellendi: ${label}`);
        addAudit('Kişiye Özel profil güncellendi', 'routing-custom', 'team', `${label}: Chat ${profile.chat}, Email ${profile.email}, Telefon ${profile.phone}, Sosyal ${profile.social}`);
        window.setTimeout(() => setToast(''), 2400);
      };
      const updateCustomRoutingChannel = (channel, value) => {
        const nextValue = Math.max(0, Math.min(10, Number(value) || 0));
        setCustomProfile(prev => ({ ...prev, [channel]: nextValue }));
      };

      return (
        <div className="h-full overflow-y-auto bg-slate-100 p-6 no-scrollbar dark:bg-slate-950">

          <section className="mb-5 rounded-2xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-950">

              <div className="flex items-center gap-3">
                <select value={teamFilter} onChange={(event) => setTeamFilter(event.target.value)} className="h-11 rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm font-black text-slate-700 outline-none focus:border-indigo-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100">

                  <option value="mine">Bana Bağlı Ekip ({currentAgent.team})</option>
                  {TEAM_GROUPS.map(team => <option key={team} value={team}>{team}</option>)}
                </select>
                <div className="rounded-xl bg-indigo-50 px-3 py-2 text-xs font-black text-indigo-700 dark:bg-indigo-950 dark:text-indigo-200">{scopedAgents.length}/{agents.length} temsilci</div>
              </div>
            </div>
            <div className="mt-4 grid grid-cols-3 gap-3">
              {TEAM_GROUPS.map(team => {
                const teamAgents = agents.filter(agent => agent.team === team);
                const activeLoad = teamAgents.reduce((sum, agent) => sum + countFor(agent, 'chat') + countFor(agent, 'email') + countFor(agent, 'phone') + countFor(agent, 'social'), 0);
                return (
                  <button key={team} onClick={() => setTeamFilter(team)} className={cx('rounded-xl border p-3 text-left transition', teamFilter === team ? 'border-indigo-400 bg-indigo-50 dark:bg-indigo-950/35' : 'border-slate-200 bg-slate-50 hover:border-indigo-200 dark:border-slate-800 dark:bg-slate-900')}>

                );

          <div className="grid grid-cols-[1.4fr_.8fr] gap-5">

              <table className="w-full text-left text-sm">

                          </select>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>

    function TicketLinkModal({ modal, tickets, onClose, onConfirm }) {
      const [targetId, setTargetId] = useState('');
      const sourceItem = modal.item;
      const sourceModule = modal.type;
      const sourceCustomer = sourceModule === 'phone' ? getCallCustomer(sourceItem) : getCustomer(sourceItem.customerId);
      const normalizedTarget = targetId.trim().replace(/^#/, '').toLocaleLowerCase('tr-TR');
      const target = normalizedTarget ? tickets.find(ticket => String(ticket.id).toLocaleLowerCase('tr-TR') === normalizedTarget) : null;
      const targetCustomer = target ? (target.module === 'phone' ? getCallCustomer(target) : getCustomer(target.customerId)) : null;
      const sameTicket = target && target.id === sourceItem.id && target.module === sourceModule;
      const alreadyLinked = target && (sourceItem.linkedTickets || []).some(link => link.id === target.id && (link.module || link.tab) === (target.module || target.tab));
      const disabled = !target || sameTicket || alreadyLinked;
      const sourceMeta = channelMeta[sourceModule] || channelMeta.email;
