    function TemplateModal({ onClose, insertTemplate }) {
      const [query, setQuery] = useState('');
      const [category, setCategory] = useState('Tümü');
      const categories = ['Tümü', ...new Set(RESPONSE_TEMPLATES.map(template => template.category))];
      const filtered = RESPONSE_TEMPLATES.filter(template => {
        const categoryOk = category === 'Tümü' || template.category === category;
        const queryOk = template.title.toLocaleLowerCase('tr-TR').includes(query.toLocaleLowerCase('tr-TR'));
        return categoryOk && queryOk;
      });

      const add = (template, append, closeAfter = true) => {
        insertTemplate(template.body, append);
        if (closeAfter) onClose();
      };

      return (
        <ModalShell title="Şablon Modalı" onClose={onClose} width="max-w-3xl">
          <div className="flex h-[620px] min-h-0 flex-col gap-4">
            <div className="flex shrink-0 gap-2 overflow-x-auto pb-1 no-scrollbar">
              {categories.map(cat => (
                <button key={cat} onClick={() => setCategory(cat)} className={cx('rounded-lg px-3 py-2 text-xs font-black', category === cat ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 dark:bg-slate-900 dark:text-slate-300')}>{cat}</button>
              ))}
            </div>
            <div className="relative shrink-0">
              <Icon icon={Search} size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
              <input value={query} onChange={(event) => setQuery(event.target.value)} placeholder="Şablon başlığı ara" className="h-11 w-full rounded-lg border border-slate-200 bg-slate-50 pl-9 pr-3 text-sm outline-none focus:border-indigo-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100" />
            </div>
            <div className="min-h-0 flex-1 overflow-y-auto pr-1 no-scrollbar">
              <div className="grid grid-cols-2 content-start gap-3">
              {filtered.map(template => (
                <div key={template.id} onClick={(event) => add(template, event.shiftKey, !event.shiftKey)} className="cursor-pointer rounded-xl border border-slate-200 bg-white p-4 transition hover:border-indigo-300 hover:bg-indigo-50 dark:border-slate-800 dark:bg-slate-950 dark:hover:bg-indigo-950/30">
                  <div className="mb-2 flex items-center justify-between gap-3">
                    <div className="text-sm font-black text-slate-900 dark:text-white">{template.title}</div>
                    <span className="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-bold text-slate-600 dark:bg-slate-900 dark:text-slate-300">{template.category}</span>
                  </div>
                  <p className="line-clamp-3 text-xs leading-5 text-slate-500 dark:text-slate-400">{template.body}</p>
                  <button onClick={(event) => { event.stopPropagation(); add(template, true, true); }} className="mt-3 rounded-lg bg-indigo-600 px-3 py-2 text-xs font-black text-white">Ekle</button>
                </div>
              ))}
              </div>
            </div>
            <div className="shrink-0 rounded-lg bg-slate-50 px-3 py-2 text-xs font-semibold text-slate-500 dark:bg-slate-900 dark:text-slate-400">Shift + tıklama ile birden fazla şablonu konuşmaya ekleyebilirsiniz.</div>
          </div>
        </ModalShell>
      );
    }

    function App() {
      const [darkMode, setDarkMode] = useState(() => {
        try {
          return window.localStorage.getItem('crm-dark-mode') === '1' || document.documentElement.classList.contains('dark');
        } catch (error) {
          return false;
        }
      });
      const [activeTab, setActiveTab] = useState('dashboard');
      const [globalSearch, setGlobalSearch] = useState('');
      const [agentStatus, setAgentStatus] = useState('online');
      const [agents, setAgents] = useState(MOCK_AGENTS);
      const [currentRole, setCurrentRole] = useState('agent');
      const [viewingAgent, setViewingAgent] = useState(null);
      const [now, setNow] = useState(Date.now());
      const [emails, setEmails] = useState(() => [...INITIAL_EMAILS, ...EXTRA_EMAILS]);
      const [chats, setChats] = useState(() => [...INITIAL_CHATS, ...EXTRA_CHATS]);
      const [social, setSocial] = useState(() => [...INITIAL_SOCIAL, ...EXTRA_SOCIAL]);
      const [calls, setCalls] = useState(INITIAL_CALLS);
      const [announcements, setAnnouncements] = useState(ANNOUNCEMENTS_SEED);
      const [knowledgeArticles, setKnowledgeArticles] = useState(KNOWLEDGE_ARTICLES);
      const [auditLog, setAuditLog] = useState([
        { id: 'log-1', timestamp: '04.05.2026 09:12', agent: 'Engin Can K.', action: 'Vardiya başladı', targetId: 'a1', targetType: 'agent', detail: 'Temsilci online oldu.' },
        { id: 'log-2', timestamp: '04.05.2026 09:28', agent: 'Engin Can K.', action: 'İç not eklendi', targetId: 'em-1001', targetType: 'email', detail: 'Operasyon danışılmalı.' }
      ]);
      const [activeEmailId, setActiveEmailId] = useState(INITIAL_EMAILS[0].id);
      const [activeChatId, setActiveChatId] = useState(INITIAL_CHATS[0].id);
      const [activeSocialId, setActiveSocialId] = useState(INITIAL_SOCIAL[0].id);
      const [activeCallId, setActiveCallId] = useState(INITIAL_CALLS[0].id);
      const [templateInsert, setTemplateInsert] = useState(null);
      const [resolveModal, setResolveModal] = useState(null);
      const [escalateModal, setEscalateModal] = useState(null);
      const [forwardModal, setForwardModal] = useState(null);
      const [holdModal, setHoldModal] = useState(null);
      const [linkModal, setLinkModal] = useState(null);
      const [quickActionModal, setQuickActionModal] = useState(null);
      const [balanceApprovalModal, setBalanceApprovalModal] = useState(null);
      const [balanceApprovals, setBalanceApprovals] = useState({});
      const [customerSideTabId, setCustomerSideTabId] = useState(null);
      const currentAgent = agents[0];

      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        document.body.classList.toggle('dark', darkMode);
        document.body.style.background = darkMode ? '#020617' : '#f1f5f9';
        try {
          window.localStorage.setItem('crm-dark-mode', darkMode ? '1' : '0');
        } catch (error) {}
      }, [darkMode]);

      useEffect(() => {
        const interval = window.setInterval(() => setNow(Date.now()), 1000);
        return () => window.clearInterval(interval);
      }, []);

      useEffect(() => {
        const openFromHash = () => {
          const ticketMatch = window.location.hash.match(/^#ticket=(email|chat|social|phone):([\w-]+)$/);
          if (ticketMatch) {
            const [, tab, id] = ticketMatch;
            setActiveTab(tab);
            if (tab === 'email') setActiveEmailId(id);
            if (tab === 'chat') setActiveChatId(id);
            if (tab === 'social') setActiveSocialId(id);
            if (tab === 'phone') setActiveCallId(id);
            window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
            return;
          }
          const match = window.location.hash.match(/^#customer-([\w-]+)$/);
          if (!match) return;
          const customerId = match[1];
          const customer = getCustomer(customerId);
          setCustomerSideTabId(customerId);
          addAudit('Müşteri sekmesi açıldı', customer.userId, 'customer', `${customer.name} hızlı çalışma sekmesi açıldı`);
          window.history.replaceState(null, '', `${window.location.pathname}${window.location.search}`);
        };
        window.addEventListener('hashchange', openFromHash);
        openFromHash();
        return () => window.removeEventListener('hashchange', openFromHash);
      }, []);

      const addAudit = (action, targetId, targetType, detail) => {
        const entry = {
          id: generateId('log'),
          timestamp: new Date().toLocaleString('tr-TR'),
          agent: currentAgent.name,
          action,
          targetId,
          targetType,
          detail
        };
        setAuditLog(prev => [entry, ...prev]);
      };

      const counts = useMemo(() => {
        const ownerId = viewingAgent?.id || (currentRole === 'agent' ? currentAgent.id : null);
        const byOwner = (item) => !ownerId || item.assignedTo === ownerId;
        const archiveStatuses = ['resolved', 'completed', 'escalated', 'hold', 'waiting'];
        const archiveCount = [...emails, ...chats, ...social, ...calls].filter(item => item.assignedTo === currentAgent.id && archiveStatuses.includes(item.status)).length
          + AGENT_ARCHIVE_SEED.filter(item => item.assignedTo === currentAgent.id).length;
        return {
          email: emails.filter(byOwner).reduce((sum, item) => sum + item.unread, 0),
          chat: chats.filter(byOwner).reduce((sum, item) => sum + item.unread, 0),
          phone: calls.filter(call => byOwner(call) && ['active', 'dialing', 'ringing', 'waiting', 'missed'].includes(call.status)).length,
          social: social.filter(byOwner).reduce((sum, item) => sum + item.unread, 0),
          agentArchive: currentRole === 'agent' ? archiveCount : 0,
          announcements: announcements.filter(item => !isAnnouncementRead(item, currentAgent.id)).length
        };
      }, [emails, chats, calls, social, announcements, currentRole, currentAgent.id, viewingAgent]);

      const searchResults = useMemo(() => {
        const query = globalSearch.trim().toLocaleLowerCase('tr-TR');
        if (!query) return [];
        const rows = [];
        const ownerId = viewingAgent?.id || (currentRole === 'agent' ? currentAgent.id : null);
        const visible = (item) => !ownerId || item.assignedTo === ownerId;
        const pushTicket = (item, tab, channel, icon) => {
          if (!visible(item)) return;
          const customer = tab === 'phone' ? getCallCustomer(item) : getCustomer(item.customerId);
          const haystack = `${customer.name} ${customer.userId} ${item.subject || ''} ${item.body || ''} ${item.category || ''} ${item.type || ''}`.toLocaleLowerCase('tr-TR');
          if (haystack.includes(query)) {
            rows.push({
              id: item.id,
              tab,
              icon,
              channel,
              title: `${customer.name} · ${item.subject || item.type}`,
              meta: `${customer.userId} · ${item.source || item.platform || 'Kanal'}`
            });
          }
        };
        emails.forEach(item => pushTicket(item, 'email', 'E-Posta', Mail));
        chats.forEach(item => pushTicket(item, 'chat', 'Canlı Destek', MessageCircle));
        social.forEach(item => pushTicket(item, 'social', 'Sosyal', Globe2));
        calls.forEach(item => pushTicket(item, 'phone', 'Telefon', Phone));
        return rows.slice(0, 8);
      }, [globalSearch, emails, chats, social, calls, currentRole, currentAgent.id, viewingAgent]);

      const pageTitle = {
        dashboard: 'Genel Bakış',
        email: 'E-Posta',
        chat: 'Canlı Destek',
        phone: 'Telefon / Çağrı',
        social: 'Sosyal Medya',
        knowledge: 'Bilgi Bankası',
        agentArchive: 'Kayıtlarım',
        reports: 'Raporlama',
        qualityArchive: 'Kayıt & Kalite',
        announcements: 'Duyurular',
        team: 'Ekip Yönetimi',
        announcementManagement: 'Duyuru Yönetimi'
      }[activeTab];

      const updateByType = (type, id, updater) => {
        const update = (setter) => setter(prev => prev.map(item => item.id === id ? (typeof updater === 'function' ? updater(item) : { ...item, ...updater }) : item));
        if (type === 'email') update(setEmails);
        if (type === 'live_chat') update(setChats);
        if (type === 'social') update(setSocial);
        if (type === 'phone') update(setCalls);
      };

      const allLinkableTickets = useMemo(() => {
        const normalize = (item, tab, module, source) => ({
          ...item,
          tab,
          module,
          source,
          createdLabel: item.createdAt ? new Date(item.createdAt).toLocaleString('tr-TR') : '-'
        });
        return [
          ...emails.map(item => normalize(item, 'email', 'email', item.source || 'E-Posta')),
          ...chats.map(item => normalize(item, 'chat', 'live_chat', item.source || 'Canlı Destek')),
          ...social.map(item => normalize(item, 'social', 'social', item.platform ? `${item.platform} · ${item.type}` : 'Sosyal Medya')),
          ...calls.map(item => normalize(item, 'phone', 'phone', item.direction || 'Telefon'))
        ];
      }, [emails, chats, social, calls]);

      const openTemplateModal = (insertFn) => setTemplateInsert({ insertFn });
      const openResolve = (item, type) => setResolveModal({ item, type });
      const openEscalate = (item, type) => setEscalateModal({ item, type });
      const openForward = (item, type) => setForwardModal({ item, type });
      const openHold = (item, type) => setHoldModal({ item, type });
      const openLink = (item, type) => setLinkModal({ item, type });
      const openQuickAction = (action, customer, dangerous) => setQuickActionModal({ action, customer, dangerous });
      const openCustomerSideTab = (customerId) => {
        setCustomerSideTabId(customerId);
        const customer = getCustomer(customerId);
        addAudit('Müşteri sekmesi açıldı', customer.userId, 'customer', `${customer.name} hızlı çalışma sekmesi açıldı`);
      };

      const callCustomerFromProfile = (customer) => {
        if (!customer || customer.id === 'unknown') return;
        const id = generateId('ca-profile');
        const call = {
          id,
          customerId: customer.id,
          status: 'dialing',
          priority: 'normal',
          startedAt: Date.now(),
          createdAt: Date.now(),
          direction: 'Giden',
          phone: customer.phone,
          subject: `${customer.name} müşteri kartından arama`,
          topic: 'Genel',
          assignedTo: currentAgent.id,
          note: '',
          messages: []
        };
        setCalls(prev => [call, ...prev]);
        setActiveCallId(id);
        setActiveTab('phone');
        addAudit('Müşteri kartından arama başlatıldı', customer.userId, 'phone', formatPhone(customer.phone));
        window.setTimeout(() => {
          setCalls(prev => prev.map(row => row.id === id ? { ...row, status: 'active', connectedAt: Date.now() } : row));
          addAudit('Müşteri kartı araması bağlandı', id, 'phone', customer.name);
        }, 2000);
      };

      const handleCustomerTabCapture = (event) => {
        const rawTarget = event.target?.nodeType === 3 ? event.target.parentElement : event.target;
        const trigger = rawTarget?.closest?.('[data-customer-tab]');
        if (!trigger) return;
        const customerId = trigger.getAttribute('data-customer-tab');
        if (!customerId) return;
        if (trigger.tagName === 'A') return;
        event.preventDefault();
        event.stopPropagation();
        openCustomerSideTab(customerId);
      };

      const selectSearchResult = (result) => {
        setActiveTab(result.tab);
        if (result.tab === 'email') setActiveEmailId(result.id);
        if (result.tab === 'chat') setActiveChatId(result.id);
        if (result.tab === 'social') setActiveSocialId(result.id);
        if (result.tab === 'phone') setActiveCallId(result.id);
        setGlobalSearch('');
      };

      const getOpenTicketsForCustomer = (customerId) => {
        const normalize = (item, tab, module, source) => ({
          ...item,
          tab,
          module,
          source,
          createdLabel: new Date(item.createdAt).toLocaleDateString('tr-TR')
        });
        return [
          ...emails.map(item => normalize(item, 'email', 'email', 'E-Posta')),
          ...chats.map(item => normalize(item, 'chat', 'live_chat', 'Canlı Destek')),
          ...social.map(item => normalize(item, 'social', 'social', 'Sosyal Medya'))
        ].filter(item => item.customerId === customerId && !['resolved', 'completed'].includes(item.status));
      };

      const getRecentTicketsForCustomer = (customerId) => CUSTOMER_TICKET_HISTORY
        .filter(ticket => ticket.customerId === customerId)
        .slice(0, 5);

      const navigateToTicket = (ticket) => {
        setActiveTab(ticket.tab);
        if (ticket.tab === 'email') setActiveEmailId(ticket.id);
        if (ticket.tab === 'chat') setActiveChatId(ticket.id);
        if (ticket.tab === 'social') setActiveSocialId(ticket.id);
        if (ticket.tab === 'phone') setActiveCallId(ticket.id);
      };

      const getAgentActiveTickets = (agentId) => {
        const normalize = (item, tab, module, source) => ({
          ...item,
          tab,
          module,
          source,
          createdLabel: new Date(item.createdAt).toLocaleDateString('tr-TR')
        });
        return [
          ...emails.map(item => normalize(item, 'email', 'email', 'E-Posta')),
          ...chats.map(item => normalize(item, 'chat', 'live_chat', 'Canlı Destek')),
          ...social.map(item => normalize(item, 'social', 'social', 'Sosyal Medya'))
        ].filter(item => item.assignedTo === agentId && !['resolved', 'completed', 'escalated', 'hold', 'waiting'].includes(item.status));
      };

      const switchRole = (role) => {
        setCurrentRole(role);
        setViewingAgent(null);
        setActiveTab('dashboard');
        addAudit(role === 'manager' ? 'Yönetici moduna geçildi' : 'Temsilci moduna dönüldü', currentAgent.id, 'agent', role === 'manager' ? 'Tüm ekip görünümü açıldı' : 'Kişisel görünüm açıldı');
      };

      const startViewingAgent = (agent) => {
        setViewingAgent(agent);
        setActiveTab('email');
        addAudit('İzleme modu açıldı', agent.id, 'agent', `${agent.name} adına salt okunur görünüm`);
      };

      const stopViewingAgent = () => {
        const name = viewingAgent?.name || 'Temsilci';
        setViewingAgent(null);
        setActiveTab('dashboard');
        addAudit('İzleme modu kapatıldı', name, 'agent', `${name} izleme modu kapatıldı`);
      };

      const confirmBalanceApproval = (reason) => {
        const customer = balanceApprovalModal.customer;
        const sourceItem = balanceApprovalModal.sourceItem;
        const sourceId = sourceItem?.id || customer.userId;
        const sourceType = sourceItem?.module || sourceItem?.channel || sourceItem?.type || 'customer';
        const ts = new Date().toLocaleString('tr-TR');
        setBalanceApprovals(prev => ({ ...prev, [customer.id]: true, [sourceId]: true }));
        setAuditLog(prev => [{
          id: generateId('log'),
          timestamp: ts,
          ts,
          agent: currentAgent.name,
          action: 'Backoffice yönlendirme onayı',
          targetId: sourceId,
          targetType: sourceType,
          reason,
          detail: `Müşteri: ${customer.name} (${customer.userId}) · Talep ID: ${sourceId} · Gerekçe: ${reason}`
        }, ...prev]);
        setBalanceApprovalModal(null);
      };

      const answerIncomingCall = (call) => {
        if (!call || call.status !== 'ringing') return;
        setCalls(prev => prev.map(row => row.id === call.id ? { ...row, status: 'active', startedAt: Date.now(), direction: 'Gelen' } : row));
        setActiveCallId(call.id);
        addAudit('Gelen çağrı cevaplandı', call.id, 'phone', getCallCustomer(call).name);
      };

      const rejectIncomingCall = (call) => {
        if (!call || call.status !== 'ringing') return;
        setCalls(prev => prev.map(row => row.id === call.id ? { ...row, status: 'missed', startedAt: null, connectedAt: null, endedAt: Date.now(), direction: 'Cevapsız', holdStartedAt: null } : row));
        if (activeCallId === call.id) {
          const fallback = calls.find(row => row.id !== call.id && !['ringing', 'active', 'dialing'].includes(row.status));
          if (fallback) setActiveCallId(fallback.id);
        }
        addAudit('Gelen çağrı reddedildi', call.id, 'phone', getCallCustomer(call).name);
      };

      const endGlobalCall = (call) => {
        setCalls(prev => prev.map(row => row.id === call.id ? { ...row, status: 'completed', endedAt: Date.now(), holdStartedAt: null } : row));
        addAudit('Çağrı widget üzerinden sonlandırıldı', call.id, 'phone', getCallCustomer(call).name);
      };

      const incomingCall = calls.find(call => call.status === 'ringing');
      const activeGlobalCall = calls.find(call => ['active', 'dialing'].includes(call.status) && !call.endedAt);

      const confirmResolve = (payload) => {
        const { item, type } = resolveModal;
        const resolvedAt = Date.now();
        const csatScore = getDemoCsatScore(`${type}-${item.id}-${resolvedAt}`);
        const resolution = {
          ...payload,
          csat: true,
          csatScore,
          surveyNote: getDemoSurveyNote(csatScore, 'resolved'),
          surveySent: true,
          surveySentAt: new Date(resolvedAt).toLocaleString('tr-TR'),
          agent: currentAgent.name
        };
        updateByType(type, item.id, row => ({
          ...row,
          status: type === 'phone' ? 'completed' : 'resolved',
          resolvedAt,
          resolution,
          unread: 0
        }));
        addAudit('Talep kapatıldı', item.id, type, `${payload.category} / ${payload.subcategory} · CSAT anketi otomatik gönderildi · Skor: ${csatScore}/5 · ${payload.note}`);
        setResolveModal(null);
      };

      const confirmEscalate = (payload) => {
        const { item, type } = escalateModal;
        const escalatedAt = Date.now();
        updateByType(type, item.id, row => {
          const escalationCategory = row.category || row.topic || row.subject || 'Kategori belirtilmedi';
          const escalation = {
            department: payload.department,
            priority: payload.priority,
            note: payload.note || 'Not eklenmedi',
            agent: currentAgent.name,
            category: escalationCategory,
            subject: row.subject || row.type || row.direction || row.id,
            at: escalatedAt,
            dateLabel: new Date(escalatedAt).toLocaleString('tr-TR')
          };
          const noteMessage = row.messages ? {
            id: generateId('escalation-note'),
            sender: 'note',
            time: new Date(escalatedAt).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
            text: `Eskalasyon: ${payload.department} · ${payload.priority} · Başlık: ${escalationCategory}${payload.note ? ` · Not: ${payload.note}` : ''}`,
            agentName: currentAgent.name,
            agentAvatar: currentAgent.avatar || getInitials(currentAgent.name)
          } : null;
          return {
            ...row,
            status: 'escalated',
            unread: 0,
            priority: payload.priority === 'Çok Acil' ? 'urgent' : row.priority,
            escalationCount: (row.escalationCount || 0) + 1,
            escalatedAt,
            escalation,
            messages: noteMessage ? [...row.messages, noteMessage] : row.messages
          };
        });
        addAudit('Talep eskale edildi', item.id, type, `${payload.department} · ${payload.priority} · ${payload.note || 'Not eklenmedi'}`);
        setEscalateModal(null);
      };

      const confirmForward = (payload) => {
        const { item, type } = forwardModal;
        updateByType(type, item.id, row => {
          const noteMessage = row.messages ? {
            id: generateId('forward-note'),
            sender: 'note',
            time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
            text: `Gruba yönlendirildi: ${payload.group}${payload.note ? ` · Not: ${payload.note}` : ''}`,
            agentName: currentAgent.name,
            agentAvatar: currentAgent.avatar || getInitials(currentAgent.name)
          } : null;
          return {
            ...row,
            status: row.status === 'completed' ? row.status : 'hold',
            unread: 0,
            forwardedGroup: payload.group,
            forwardNote: payload.note,
            forwardedBy: currentAgent.name,
            forwardedAt: Date.now(),
            messages: noteMessage ? [...row.messages, noteMessage] : row.messages
          };
        });
        addAudit('Talep gruba yönlendirildi', item.id, type, `${payload.group} · ${payload.note || 'Not eklenmedi'}`);
        setForwardModal(null);
      };

      const confirmHold = (payload) => {
        const { item, type } = holdModal;
        updateByType(type, item.id, row => {
          const noteMessage = row.messages ? {
            id: generateId('hold-note'),
            sender: 'note',
            time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
            text: `Bekletme: ${payload.reason} · Takip: ${payload.followUp}`,
            agentName: currentAgent.name,
            agentAvatar: currentAgent.avatar || getInitials(currentAgent.name)
          } : null;
          return {
            ...row,
            status: 'hold',
            unread: 0,
            holdReason: payload.reason,
            holdFollowUp: payload.followUp,
            holdAgent: currentAgent.name,
            holdStartedAt: Date.now(),
            messages: noteMessage ? [...row.messages, noteMessage] : row.messages
          };
        });
        addAudit('Talep beklemeye alındı', item.id, type, `${payload.followUp} · ${payload.reason}`);
        setHoldModal(null);
      };

      const makeTicketReference = (ticket, moduleOverride) => {
        const module = moduleOverride || ticket.module || getItemChannelType(ticket);
        const customer = module === 'phone' ? getCallCustomer(ticket) : getCustomer(ticket.customerId);
        return {
          id: ticket.id,
          tab: ticket.tab || getTicketTabForType(module),
          module,
          source: ticket.source || channelLabels[module] || 'Talep',
          subject: ticket.subject || ticket.body || ticket.direction || 'Talep',
          category: ticket.category || ticket.topic || '-',
          status: ticket.status,
          customerName: customer.name,
          createdLabel: ticket.createdAt ? new Date(ticket.createdAt).toLocaleString('tr-TR') : ticket.createdLabel || '-'
        };
      };

      const addLinkedReference = (item, relation) => {
        const currentLinks = item.linkedTickets || [];
        const exists = currentLinks.some(link => link.id === relation.id && (link.module || link.tab) === (relation.module || relation.tab));
        if (exists) return item;
        const noteMessage = Array.isArray(item.messages) ? {
          id: generateId('link-note'),
          sender: 'note',
          time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
          text: `İlişkili talep eklendi: ${relation.source} #${relation.id} - ${relation.subject}`,
          agentName: currentAgent.name,
          agentAvatar: currentAgent.avatar || getInitials(currentAgent.name)
        } : null;
        return {
          ...item,
          linkedTickets: [...currentLinks, relation],
          messages: noteMessage ? [...item.messages, noteMessage] : item.messages
        };
      };

      const confirmLink = (targetTicket) => {
        if (!linkModal || !targetTicket) return;
        const sourceRef = makeTicketReference(linkModal.item, linkModal.type);
        const targetRef = makeTicketReference(targetTicket, targetTicket.module);
        if (sourceRef.id === targetRef.id && sourceRef.module === targetRef.module) return;

        updateByType(linkModal.type, linkModal.item.id, row => addLinkedReference(row, targetRef));
        updateByType(targetRef.module, targetRef.id, row => addLinkedReference(row, sourceRef));
        addAudit('Talep ilişkilendirildi', linkModal.item.id, linkModal.type, `${sourceRef.source} #${sourceRef.id} ↔ ${targetRef.source} #${targetRef.id}`);
        setLinkModal(null);
      };

      const confirmQuickAction = ({ timestamp }) => {
        const modal = quickActionModal;
        addAudit('Hızlı aksiyon uygulandı', modal.customer.userId, 'customer', `${modal.action} · ${timestamp}`);
        setQuickActionModal(null);
      };

      const markAnnouncementRead = (id) => {
        setAnnouncements(prev => prev.map(item => item.id === id ? { ...item, readBy: Array.from(new Set([...(item.readBy || []), currentAgent.id])) } : item));
        addAudit('Duyuru okundu', id, 'announcement', 'Sistem duyurusu okundu olarak işaretlendi');
      };

      const markAllAnnouncementsRead = () => {
        setAnnouncements(prev => prev.map(item => ({ ...item, readBy: Array.from(new Set([...(item.readBy || []), currentAgent.id])) })));
        addAudit('Tüm duyurular okundu', 'all', 'announcement', 'Bildirim menüsünden toplu okundu işaretlendi');
      };

      return (
        <div className={darkMode ? 'dark' : ''} onClickCapture={handleCustomerTabCapture}>
          <div className="min-w-[1280px] bg-slate-100 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
            <Sidebar
              activeTab={activeTab}
              setActiveTab={setActiveTab}
              counts={counts}
              agentStatus={agentStatus}
              setAgentStatus={(status) => {
                setAgentStatus(status);
                setAgents(prev => prev.map(agent => agent.id === currentAgent.id ? { ...agent, status } : agent));
                addAudit('Temsilci durumu değişti', currentAgent.id, 'agent', agentStatusMeta[status].label);
              }}
              currentRole={currentRole}
              setCurrentRole={setCurrentRole}
              currentAgent={currentAgent}
              onRoleSwitch={switchRole}
            />
            <Header
              title={pageTitle}
              darkMode={darkMode}
              setDarkMode={setDarkMode}
              announcementCount={counts.announcements}
              setActiveTab={setActiveTab}
              searchValue={globalSearch}
              onSearchChange={setGlobalSearch}
              searchResults={searchResults}
              onSearchSelect={selectSearchResult}
              currentAgent={currentAgent}
              announcements={announcements}
              markAnnouncementRead={markAnnouncementRead}
              markAllAnnouncementsRead={markAllAnnouncementsRead}
              agents={agents}
              showAnnouncementAudience={currentRole === 'manager'}
            />
            <main className="ml-64 flex h-screen flex-col pt-16">
              {currentRole === 'manager' && <ManagerModeBanner onExit={() => switchRole('agent')} />}
              {viewingAgent && <ViewingModeBanner viewingAgent={viewingAgent} onStop={stopViewingAgent} />}
              <div className="min-h-0 flex-1">
                {activeTab === 'dashboard' && (
                  currentRole === 'agent' ? (
                    <AgentDashboard
                      currentAgent={currentAgent}
                      activeTickets={getAgentActiveTickets(currentAgent.id)}
                      announcements={announcements}
                      markAnnouncementRead={markAnnouncementRead}
                      now={now}
                      onNavigateTicket={navigateToTicket}
                    />
                  ) : (
                    <Dashboard
                      agents={agents}
                      announcements={announcements}
                      markAnnouncementRead={markAnnouncementRead}
                      auditLog={auditLog}
                      emailItems={emails}
                      chatItems={chats}
                      socialItems={social}
                      calls={calls}
                      onViewAgent={startViewingAgent}
                    />
                  )
                )}
                {activeTab === 'email' && (
                  <EmailWorkspace
                    items={emails}
                    setItems={setEmails}
                    activeId={activeEmailId}
                    setActiveId={setActiveEmailId}
                    now={now}
                    openTemplateModal={openTemplateModal}
                    openResolve={openResolve}
                    openEscalate={openEscalate}
                    openForward={openForward}
                    openHold={openHold}
                    openLink={openLink}
                    addAudit={addAudit}
                    getOpenTicketsForCustomer={getOpenTicketsForCustomer}
                    getRecentTicketsForCustomer={getRecentTicketsForCustomer}
                    onNavigateTicket={navigateToTicket}
                    onRequestBalance={(customer, sourceItem) => setBalanceApprovalModal({ customer, sourceItem })}
                    balanceApprovals={balanceApprovals}
                    currentRole={currentRole}
                    currentAgent={currentAgent}
                    agents={agents}
                    viewingAgent={viewingAgent}
                    onOpenCustomerTab={openCustomerSideTab}
                    knowledgeArticles={knowledgeArticles}
                  />
                )}
                {activeTab === 'chat' && (
                  <ChannelWorkspace
                    items={chats}
                    setItems={setChats}
                    activeId={activeChatId}
                    setActiveId={setActiveChatId}
                    type="live_chat"
                    now={now}
                    openTemplateModal={openTemplateModal}
                    openResolve={openResolve}
                    openEscalate={openEscalate}
                    openForward={openForward}
                    openHold={openHold}
                    openLink={openLink}
                    openQuickAction={openQuickAction}
                    addAudit={addAudit}
                    getOpenTicketsForCustomer={getOpenTicketsForCustomer}
                    getRecentTicketsForCustomer={getRecentTicketsForCustomer}
                    onNavigateTicket={navigateToTicket}
                    onRequestBalance={(customer, sourceItem) => setBalanceApprovalModal({ customer, sourceItem })}
                    balanceApprovals={balanceApprovals}
                    currentRole={currentRole}
                    currentAgent={currentAgent}
                    agents={agents}
                    viewingAgent={viewingAgent}
                    onOpenCustomerTab={openCustomerSideTab}
                    knowledgeArticles={knowledgeArticles}
                  />
                )}
                {activeTab === 'phone' && <PhoneModule calls={calls} setCalls={setCalls} activeId={activeCallId} setActiveId={setActiveCallId} now={now} openResolve={openResolve} openEscalate={openEscalate} openForward={openForward} openLink={openLink} addAudit={addAudit} getOpenTicketsForCustomer={getOpenTicketsForCustomer} getRecentTicketsForCustomer={getRecentTicketsForCustomer} onNavigateTicket={navigateToTicket} onRequestBalance={(customer, sourceItem) => setBalanceApprovalModal({ customer, sourceItem })} balanceApprovals={balanceApprovals} currentRole={currentRole} currentAgent={currentAgent} agents={agents} viewingAgent={viewingAgent} onOpenCustomerTab={openCustomerSideTab} knowledgeArticles={knowledgeArticles} />}
                {activeTab === 'social' && <SocialModule items={social} setItems={setSocial} activeId={activeSocialId} setActiveId={setActiveSocialId} now={now} openResolve={openResolve} openEscalate={openEscalate} openForward={openForward} openHold={openHold} openLink={openLink} openQuickAction={openQuickAction} openTemplateModal={openTemplateModal} addAudit={addAudit} getOpenTicketsForCustomer={getOpenTicketsForCustomer} getRecentTicketsForCustomer={getRecentTicketsForCustomer} onNavigateTicket={navigateToTicket} onRequestBalance={(customer, sourceItem) => setBalanceApprovalModal({ customer, sourceItem })} balanceApprovals={balanceApprovals} currentRole={currentRole} currentAgent={currentAgent} agents={agents} viewingAgent={viewingAgent} onOpenCustomerTab={openCustomerSideTab} knowledgeArticles={knowledgeArticles} />}
                {activeTab === 'knowledge' && <KnowledgeCenter articles={knowledgeArticles} setArticles={setKnowledgeArticles} currentRole={currentRole} addAudit={addAudit} currentAgent={currentAgent} />}
                {activeTab === 'agentArchive' && currentRole === 'agent' && <QualityArchive emails={emails} chats={chats} social={social} calls={calls} agents={agents} currentAgent={currentAgent} mode="agent" />}
                {activeTab === 'reports' && currentRole === 'manager' && <Reports auditLog={auditLog} agents={agents} emails={emails} chats={chats} social={social} calls={calls} announcements={announcements} />}
                {activeTab === 'qualityArchive' && currentRole === 'manager' && <QualityArchive emails={emails} chats={chats} social={social} calls={calls} agents={agents} />}
                {activeTab === 'announcements' && <Announcements announcements={announcements} markAnnouncementRead={markAnnouncementRead} currentAgent={currentAgent} currentRole={currentRole} agents={agents} />}
                {activeTab === 'team' && currentRole === 'manager' && <TeamManagement agents={agents} setAgents={setAgents} emailItems={emails} chatItems={chats} socialItems={social} calls={calls} setEmails={setEmails} setChats={setChats} setSocial={setSocial} setCalls={setCalls} addAudit={addAudit} currentAgent={currentAgent} />}
                {activeTab === 'announcementManagement' && currentRole === 'manager' && <AnnouncementManagement announcements={announcements} setAnnouncements={setAnnouncements} addAudit={addAudit} agents={agents} />}
              </div>
            </main>

            {customerSideTabId && (
              <CustomerSideTab
                customerId={customerSideTabId}
                onClose={() => setCustomerSideTabId(null)}
                emails={emails}
                chats={chats}
                social={social}
                calls={calls}
                auditLog={auditLog}
                agents={agents}
                onNavigateTicket={navigateToTicket}
                onRequestBalance={(customer, sourceItem) => setBalanceApprovalModal({ customer, sourceItem })}
                balanceApproved={Boolean(balanceApprovals[customerSideTabId])}
                onCallCustomer={callCustomerFromProfile}
              />
            )}
            <GlobalCallWidget incomingCall={incomingCall} activeCall={activeGlobalCall} now={now} onAnswer={answerIncomingCall} onReject={rejectIncomingCall} onEnd={endGlobalCall} />
            {templateInsert && <TemplateModal insertTemplate={(text, append) => templateInsert.insertFn(text, append)} onClose={() => setTemplateInsert(null)} />}
            {resolveModal && <ResolveModal modal={resolveModal} onClose={() => setResolveModal(null)} onConfirm={confirmResolve} />}
            {escalateModal && <EscalateModal modal={escalateModal} onClose={() => setEscalateModal(null)} onConfirm={confirmEscalate} />}
            {forwardModal && <ForwardModal modal={forwardModal} onClose={() => setForwardModal(null)} onConfirm={confirmForward} />}
            {holdModal && <HoldModal modal={holdModal} onClose={() => setHoldModal(null)} onConfirm={confirmHold} />}
            {linkModal && <TicketLinkModal modal={linkModal} tickets={allLinkableTickets} onClose={() => setLinkModal(null)} onConfirm={confirmLink} />}
            {quickActionModal && <QuickActionModal modal={quickActionModal} onClose={() => setQuickActionModal(null)} onConfirm={confirmQuickAction} currentAgent={currentAgent} />}
            {balanceApprovalModal && <BalanceApprovalModal modal={balanceApprovalModal} onClose={() => setBalanceApprovalModal(null)} onConfirm={confirmBalanceApproval} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
