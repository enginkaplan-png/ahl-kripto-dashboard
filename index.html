        </div>

    function TicketList({ items, activeId, setActiveId, type, now, filterBar, agents = [], currentRole, viewingAgent, onAssign, monitoringMode = false, onOpenCustomerTab }) {
      const channelIcon = (item) => {
        if (item.channel === 'webform') return MessageSquare;
        if (type === 'live_chat') return MessageCircle;
        if (type === 'social') return Globe2;
        return Mail;
      };
      const sortedItems = monitoringMode
        ? [...items].sort((left, right) => {
            const leftFlags = getTicketFlags(left, type, now);
            const rightFlags = getTicketFlags(right, type, now);
            const priorityDiff = flagPriorityScore(rightFlags) - flagPriorityScore(leftFlags);
            if (priorityDiff) return priorityDiff;
            return (right.unread || 0) - (left.unread || 0) || left.createdAt - right.createdAt;
          })
        : items;

      return (
        <section className="w-72 shrink-0 border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">
          <div className="border-b border-slate-200 p-4 dark:border-slate-800">
            <div className="flex items-center justify-between">
              <div className="text-sm font-black text-slate-900 dark:text-white">Talep Listesi</div>
              <span className="rounded-full bg-slate-100 px-2 py-1 text-xs font-bold text-slate-600 dark:bg-slate-900 dark:text-slate-300">{items.length}</span>
            </div>
            {filterBar}
          </div>
          <div className="h-[calc(100vh-8rem)] overflow-y-auto no-scrollbar">
            {sortedItems.map(item => {
              const customer = getCustomer(item.customerId);
              const active = item.id === activeId;
              const flags = getTicketFlags(item, type, now);
              const assignedAgent = agents.find(agent => agent.id === item.assignedTo);
              const statusMeta = ticketStatusMeta[item.status] || ticketStatusMeta.active;
              const sla = getSlaInfo(item, type, now);
              const summary = flags.includes('KEYWORD_FLAG')
                ? { label: 'Hassas ifade', className: 'bg-red-50 text-red-700 border-red-200 dark:bg-red-950/50 dark:text-red-200 dark:border-red-800' }
                : sla.expired
                  ? { label: 'SLA aşıldı', className: 'bg-red-50 text-red-700 border-red-200 dark:bg-red-950/50 dark:text-red-200 dark:border-red-800' }
                  : flags.includes('SLA_CRITICAL')
                    ? { label: `${sla.label} kaldı`, className: 'bg-amber-50 text-amber-700 border-amber-200 dark:bg-amber-950/50 dark:text-amber-200 dark:border-amber-800' }
                    : item.unread > 0
                      ? { label: `${item.unread} yeni mesaj`, className: 'bg-indigo-50 text-indigo-700 border-indigo-200 dark:bg-indigo-950/50 dark:text-indigo-200 dark:border-indigo-800' }
                      : { label: statusMeta.label, className: `${statusMeta.badge} border-transparent` };
              return (
                <button
                  key={item.id}
                  onClick={() => setActiveId(item.id)}
                  className={cx(
                    'block w-full border-b border-l-4 border-b-slate-100 p-3 text-left transition dark:border-b-slate-900',
                    statusColors[item.status] || statusColors.active,
                    active ? 'bg-indigo-50 dark:bg-indigo-950/35' : 'bg-white hover:bg-slate-50 dark:bg-slate-950 dark:hover:bg-slate-900/80'
                  )}
                >
                  <div className="flex items-start gap-2">
                    <div className={cx('mt-0.5 rounded-lg p-1.5', active ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500 dark:bg-slate-900 dark:text-slate-300')}>
                      <Icon icon={channelIcon(item)} size={15} />
                    </div>
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-1.5">
                        <span data-customer-tab={customer.id} onClick={(event) => { event.stopPropagation(); onOpenCustomerTab?.(customer.id); }} className="truncate text-sm font-black text-slate-900 underline-offset-2 hover:text-indigo-600 hover:underline dark:text-white dark:hover:text-indigo-300">{maskName(customer.name)}</span>
                        <CustomerTierBadge customer={customer} />
                      </div>
                      <div className="mt-0.5 truncate text-[11px] text-slate-500 dark:text-slate-400">{item.source || item.platform} · {item.category || item.type}</div>
                    </div>
                    {assignedAgent && (
                      <span title={assignedAgent.name} className={cx('flex h-7 w-7 shrink-0 items-center justify-center rounded-lg text-[10px] font-black', AGENT_COLORS[assignedAgent.id] || 'bg-slate-100 text-slate-600 dark:bg-slate-900 dark:text-slate-300')}>
                        {assignedAgent.avatar || assignedAgent.name.split(' ').map(part => part[0]).join('')}
                      </span>
                    )}
                  </div>
                  <div className="mt-2 truncate text-xs font-black text-slate-800 dark:text-slate-200">{item.subject}</div>
                  <div className="mt-1 line-clamp-1 text-xs leading-5 text-slate-500 dark:text-slate-400">{lastSnippet(item)}</div>
                  <div className="mt-2 flex items-center justify-between gap-2">
                    <span className={cx('rounded-full border px-2 py-1 text-[10px] font-black', summary.className)}>{summary.label}</span>
                    <span className="min-w-0 truncate text-[10px] font-bold text-slate-400">{assignedAgent?.name || 'Atanmamış'}</span>
                  </div>
                  {active && currentRole === 'manager' && !viewingAgent && onAssign && (
                    <select
                      value={item.assignedTo}
                      onClick={(event) => event.stopPropagation()}
                      onChange={(event) => onAssign(item.id, Number(event.target.value))}
                      className="mt-2 h-7 w-full rounded-lg border border-slate-200 bg-white px-2 text-[11px] font-bold text-slate-600 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200"
                    >
                      {agents.map(agent => <option key={agent.id} value={agent.id}>Ata: {agent.name}</option>)}
                    </select>
                  )}
                </button>
              );
            })}
          </div>
        </section>
      );
    }

    function MessageBubble({ message, fallbackAgentName = 'Engin Can K.' }) {
      if (message.sender === 'note') {
        const noteAuthor = message.agentName || message.author || message.by || fallbackAgentName;
        const noteAvatar = message.agentAvatar || getInitials(noteAuthor);
        return (
          <div className="mx-auto my-3 flex max-w-[82%] items-start gap-3 rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900 dark:border-amber-800 dark:bg-amber-950/50 dark:text-amber-100">
            <div className="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-amber-500 text-[10px] font-black text-white">{noteAvatar}</div>
            <div className="min-w-0 flex-1">
              <div className="mb-1 flex items-center gap-2 text-xs font-black uppercase tracking-wide">
                <Icon icon={Lock} size={13} />
                İç Not · {noteAuthor}
              </div>
              <div>{message.text}</div>
              <div className="mt-1 text-right text-[11px] opacity-70">{message.time}</div>
            </div>
          </div>
        );
      }
      if (message.sender === 'supervisor') {
        return (
          <div className="mx-auto my-3 max-w-[82%] rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900 dark:border-amber-800 dark:bg-amber-950/50 dark:text-amber-100">
            <div className="mb-1 flex items-center gap-2 text-xs font-black uppercase tracking-wide">
              <Icon icon={Shield} size={13} />
              Süpervizör Fısıltısı
            </div>
            <div>{message.text}</div>
            <div className="mt-1 text-right text-[11px] opacity-70">{message.time}</div>
          </div>
        );
      }
      const isAgent = message.sender === 'agent';
      return (
        <div className={cx('my-3 flex', isAgent ? 'justify-end' : 'justify-start')}>
          <div className={cx(
            'max-w-[74%] rounded-2xl px-4 py-3 text-sm leading-6 shadow-sm',
            isAgent
              ? 'rounded-br-md bg-indigo-600 text-white'
              : 'rounded-bl-md border border-slate-200 bg-white text-slate-800 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100'
          )}>
            <div>{message.text}</div>
            <div className={cx('mt-1 text-right text-[11px]', isAgent ? 'text-indigo-100' : 'text-slate-400')}>{message.time}</div>
          </div>
        </div>
      );
    }

    function ConversationPanel({
      item,
      type,
      now,
      onSendMessage,
      openTemplateModal,
      openResolve,
      openEscalate,
      openForward,
      openHold,
      openLink,
      externalInsert,
      clearExternalInsert,
      readOnly,
      onWhisper,
      currentAgent,
      monitoringMode = false,
      flags = [],
      assignedAgent,
      onTakeover,
      onOpenCustomerTab,
      knowledgeArticles = KNOWLEDGE_ARTICLES
    }) {
      const customer = getCustomer(item.customerId);
      const [mode, setMode] = useState('reply');
      const [draft, setDraft] = useState('');
      const [action, setAction] = useState('');
      const [typing, setTyping] = useState(false);
      const [aiUsed, setAiUsed] = useState(false);
      const [slashActive, setSlashActive] = useState(false);
      const [slashQuery, setSlashQuery] = useState('');
      const [slashIndex, setSlashIndex] = useState(0);
      const [whisperOpen, setWhisperOpen] = useState(false);
      const [whisperText, setWhisperText] = useState('');
      const bottomRef = useRef(null);
      const typingTimer = useRef(null);
      const wrongNetwork = detectWrongNetwork(item.messages);
      const unansweredCount = getUnansweredCount(item.messages || []);
      const slashResults = useMemo(() => {
        const q = slashQuery.toLocaleLowerCase('tr-TR');
        return TEMPLATES.filter(template => `${template.title} ${template.text}`.toLocaleLowerCase('tr-TR').includes(q)).slice(0, 5);
      }, [slashQuery]);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }, [item.id, item.messages.length]);

      useEffect(() => {
        setDraft('');
        setMode('reply');
        setAiUsed(false);
        setSlashActive(false);
        setSlashQuery('');
        setSlashIndex(0);
      }, [item.id]);

      useEffect(() => {
        if (externalInsert?.id) {
          setDraft(prev => `${prev}${prev ? '\n\n' : ''}${externalInsert.text}`);
          clearExternalInsert();
        }
      }, [externalInsert]);

      const handleDraftChange = (value) => {
        setDraft(value);
        if (type === 'live_chat') {
          setTyping(true);
          window.clearTimeout(typingTimer.current);
          typingTimer.current = window.setTimeout(() => setTyping(false), 2000);
          const match = value.match(/(?:^|\s)\/([^\s]*)$/);
          if (match && /^[a-zA-ZğüşöçıİĞÜŞÖÇ]*$/.test(match[1])) {
            setSlashActive(true);
            setSlashQuery(match[1]);
            setSlashIndex(0);
          } else {
            setSlashActive(false);
            setSlashQuery('');
            setSlashIndex(0);
          }
        }
      };

      const insertSlashTemplate = (template) => {
        setDraft(prev => prev.replace(/(?:^|\s)\/([^\s]*)$/, match => {
          const prefix = match.startsWith(' ') ? ' ' : '';
          return `${prefix}${template.text}`;
        }));
        setSlashActive(false);
        setSlashQuery('');
        setSlashIndex(0);
      };

      const handleDraftKeyDown = (event) => {
        if (type !== 'live_chat') return;
        if (slashActive) {
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            setSlashIndex(prev => Math.min(prev + 1, Math.max(0, slashResults.length - 1)));
          }
          if (event.key === 'ArrowUp') {
            event.preventDefault();
            setSlashIndex(prev => Math.max(0, prev - 1));
          }
          if (event.key === 'Enter' && slashResults[slashIndex]) {
            event.preventDefault();
            insertSlashTemplate(slashResults[slashIndex]);
          }
          if (event.key === 'Escape') {
            event.preventDefault();
            setDraft('');
            setSlashActive(false);
            setSlashQuery('');
            setSlashIndex(0);
          }
          return;
        }
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          send();
        }
      };

      const send = () => {
        if (readOnly) return;
        const text = draft.trim();
        if (!text) return;
        onSendMessage(item.id, text, mode === 'note');
        setDraft('');
        setAiUsed(false);
      };

      const applyAction = () => {
        if (readOnly) return;
        if (action === 'resolve') openResolve(item, type);
        if (action === 'escalate') openEscalate(item, type);
        if (action === 'forward') openForward(item, type);
        if (action === 'hold') openHold(item, type);
        if (action === 'link') openLink?.(item, type);
        setAction('');
      };

      const handleActionChange = (value) => {
        if (value === 'link' && !readOnly) {
          openLink?.(item, type);
          setAction('');
          return;
        }
        setAction(value);
      };

      const addAiDraft = () => {
        if (readOnly) return;
        setDraft(buildSmartDraft({
          item,
          customer,
          currentAgent,
          articles: knowledgeArticles,
          activeTopic: item.topic || item.category,
          channel: type
        }));
        setAiUsed(true);
        setMode('reply');
      };

      return (
        <section className="flex min-w-0 flex-1 flex-col bg-slate-50 dark:bg-slate-950">
          <div className="border-b border-slate-200 bg-white px-5 py-4 dark:border-slate-800 dark:bg-slate-950">
            <div className="flex items-start justify-between gap-4">
              <div>
                <div className="flex items-center gap-3">
                  <button onClick={() => onOpenCustomerTab?.(customer.id)} className="text-left text-lg font-black text-slate-900 underline-offset-4 hover:text-indigo-600 hover:underline dark:text-white dark:hover:text-indigo-300">{customer.name}</button>
                  <CustomerTierBadge customer={customer} compact={false} />
                  <span className="rounded-full bg-slate-100 px-2 py-1 text-xs font-bold text-slate-600 dark:bg-slate-900 dark:text-slate-300">{customer.userId}</span>
                </div>
                <div className="mt-1 flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                  <Icon icon={type === 'live_chat' ? MessageCircle : Mail} size={15} />
                  {item.source} · {item.subject}
                </div>
              </div>
              <div className="flex items-center gap-2">
                {monitoringMode && (
                  <span className="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-[11px] font-black text-slate-600 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300">
                    <Icon icon={Eye} size={12} />
                    İzleme: {assignedAgent?.name || 'Atanmamış'}
                  </span>
                )}
                <SlaBadge item={item} type={type} now={now} large />
                {monitoringMode && assignedAgent?.id !== currentAgent.id && (
                  <button onClick={onTakeover} className="flex items-center gap-2 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2 text-xs font-black text-indigo-700 transition hover:bg-indigo-100 dark:border-indigo-800 dark:bg-indigo-950/50 dark:text-indigo-200 dark:hover:bg-indigo-950">
                    <Icon icon={UserPlus} size={15} />
                    Talebi Al
                  </button>
                )}
                <button
                  disabled={readOnly}
                  title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''}
                  onClick={() => setMode(mode === 'note' ? 'reply' : 'note')}
                  className={cx(
                    'flex items-center gap-2 rounded-lg border px-3 py-2 text-xs font-black transition disabled:cursor-not-allowed disabled:opacity-50',
                    mode === 'note'
                      ? 'border-amber-300 bg-amber-100 text-amber-800 dark:border-amber-800 dark:bg-amber-950 dark:text-amber-100'
                      : 'border-slate-200 bg-white text-slate-600 hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300'
                  )}
                >
                  <Icon icon={mode === 'note' ? EyeOff : Eye} size={15} />
                  İÇ NOT EKLE
                </button>
              </div>
            </div>
          </div>
          <ConversationNoticeBar flags={monitoringMode ? flags : []} unansweredCount={unansweredCount} item={item} wrongNetwork={wrongNetwork} />

          <div className="flex-1 overflow-y-auto px-6 py-5 no-scrollbar">
            {item.messages.map(message => <MessageBubble key={message.id} message={message} fallbackAgentName={currentAgent.name} />)}
            {typing && (
              <div className="my-2 inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-semibold text-slate-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300">
                <span className="h-2 w-2 animate-pulse rounded-full bg-indigo-500"></span>
                Yazıyor...
              </div>
            )}
            <div ref={bottomRef}></div>
          </div>

          <div className={cx(
            'border-t p-4 dark:border-slate-800',
            mode === 'note' ? 'border-amber-200 bg-amber-50 dark:bg-amber-950/25' : 'border-slate-200 bg-white dark:bg-slate-950'
          )}>
            {type === 'email' && (
              <div className="mb-3 flex items-center gap-2">
                {['Yanıtla', 'İç Not'].map(label => {
                  const value = label === 'Yanıtla' ? 'reply' : 'note';
                  return (
                    <button
                      key={label}
                      disabled={readOnly}
                      title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''}
                      onClick={() => setMode(value)}
                      className={cx(
                        'rounded-lg px-3 py-2 text-xs font-black disabled:cursor-not-allowed disabled:opacity-50',
                        mode === value
                          ? value === 'note' ? 'bg-amber-500 text-white' : 'bg-indigo-600 text-white'
                          : 'bg-slate-100 text-slate-600 dark:bg-slate-900 dark:text-slate-300'
                      )}
                    >
                      {label}
                    </button>
                  );
                })}
              </div>
            )}
            {readOnly && (
              <div className="mb-3 flex items-center justify-between rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-xs font-bold text-amber-800 dark:border-amber-800 dark:bg-amber-950/40 dark:text-amber-100">
                <span>İzleme modunda düzenleme yapamazsınız.</span>
                <button onClick={() => setWhisperOpen(!whisperOpen)} className="rounded bg-amber-500 px-2 py-1 text-[11px] font-black text-white">Fısılt Notu Gönder</button>
              </div>
            )}
            {readOnly && whisperOpen && (
              <div className="mb-3 rounded-lg border border-amber-200 bg-amber-50 p-3 dark:border-amber-800 dark:bg-amber-950/30">
                <textarea value={whisperText} onChange={(event) => setWhisperText(event.target.value)} className="h-20 w-full resize-none rounded-lg border border-amber-300 bg-white p-2 text-xs outline-none focus:border-amber-500 dark:border-amber-800 dark:bg-slate-950 dark:text-slate-100" placeholder="Temsilciye görünür, müşteriye gitmez..."></textarea>
                <button onClick={() => { if (whisperText.trim()) { onWhisper(whisperText.trim()); setWhisperText(''); setWhisperOpen(false); } }} disabled={!whisperText.trim()} className="mt-2 rounded bg-amber-500 px-3 py-2 text-xs font-black text-white disabled:opacity-40">Notu Gönder</button>
              </div>
            )}

            {type === 'email' && mode === 'reply' && (
              <div className="mb-2 flex items-center justify-between rounded-t-lg border border-b-0 border-slate-200 bg-slate-50 px-3 py-2 dark:border-slate-800 dark:bg-slate-900">
                <div className="flex items-center gap-1">
                  {[
                    { icon: Reply, label: 'Yanıtla' },
                    { icon: ReplyAll, label: 'Tümünü Yanıtla' },
                    { icon: Forward, label: 'İlet' }
                  ].map(button => (
                    <button key={button.label} title={button.label} className="rounded-md p-2 text-slate-500 hover:bg-white hover:text-indigo-600 dark:hover:bg-slate-800">
                      <Icon icon={button.icon} size={16} />
                    </button>
                  ))}
                </div>
                <div className="flex items-center gap-1">
                  {[Bold, Italic, Underline, Paperclip, ImageIcon].map((icon, index) => (
                    <button key={index} className="rounded-md p-2 text-slate-500 hover:bg-white hover:text-indigo-600 dark:hover:bg-slate-800">
                      <Icon icon={icon} size={16} />
                    </button>
                  ))}
                </div>
              </div>
            )}

            {mode === 'note' && (
              <div className="mb-2 flex items-center gap-2 text-xs font-bold text-amber-800 dark:text-amber-100">
                <Icon icon={Lock} size={14} />
                Bu not müşteriye gönderilmez.
              </div>
            )}
            <div className="relative">
              {type === 'live_chat' && slashActive && (
                <div className="absolute bottom-[calc(100%+8px)] left-0 right-0 z-40 max-h-[220px] overflow-y-auto rounded-xl border border-indigo-200 bg-white shadow-2xl no-scrollbar dark:border-indigo-800 dark:bg-slate-900">
                  {slashResults.length === 0 ? (
                    <div className="px-3 py-2 text-xs font-bold text-slate-500 dark:text-slate-400">Eşleşen şablon yok.</div>
                  ) : slashResults.map((template, index) => (
                    <button
                      key={template.id}
                      onMouseDown={(event) => { event.preventDefault(); insertSlashTemplate(template); }}
                      className={cx(
                        'grid w-full grid-cols-[auto_1fr] gap-2 border-b border-slate-100 px-3 py-2 text-left last:border-0 dark:border-slate-800',
                        index === slashIndex ? 'bg-indigo-50 dark:bg-indigo-900/20' : 'hover:bg-slate-50 dark:hover:bg-slate-800'
                      )}
                    >
                      <span className="rounded-full bg-indigo-100 px-2 py-0.5 text-[10px] font-black text-indigo-700 dark:bg-indigo-950 dark:text-indigo-200">{template.category}</span>
                      <span className="min-w-0">
                        <span className="block truncate text-xs font-black text-slate-900 dark:text-white">{template.title}</span>
                        <span className="block truncate text-[11px] text-slate-500 dark:text-slate-400">{template.text.slice(0, 40)}</span>
                      </span>
                    </button>
                  ))}
                </div>
              )}
              <textarea
                disabled={readOnly}
                title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''}
                value={draft}
                onChange={(event) => handleDraftChange(event.target.value)}
                onKeyDown={handleDraftKeyDown}
                placeholder={mode === 'note' ? 'İç notunuzu yazın...' : type === 'live_chat' ? 'Müşteriye yanıt yazın... / ile şablon arayın' : 'E-posta yanıtınızı yazın...'}
                className={cx(
                  'h-28 w-full resize-none rounded-lg border p-3 text-sm leading-6 outline-none transition no-scrollbar dark:text-slate-100',
                  readOnly
                    ? 'border-slate-200 bg-slate-100 opacity-60 dark:border-slate-800 dark:bg-slate-900'
                    : slashActive && type === 'live_chat'
                    ? 'border-indigo-500 bg-white dark:bg-slate-900'
                    : mode === 'note'
                      ? 'border-amber-300 bg-amber-50 focus:border-amber-500 dark:border-amber-800 dark:bg-amber-950/40'
                      : 'border-slate-200 bg-white focus:border-indigo-500 dark:border-slate-800 dark:bg-slate-900'
                )}
              />
            </div>
            <div className="mt-3 flex items-center justify-between gap-3">
              <div className="flex items-center gap-2">
                <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={() => openTemplateModal((text, append) => setDraft(prev => append ? `${prev}${prev ? '\n\n' : ''}${text}` : text))} className="rounded-lg border border-slate-200 px-3 py-2 text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:text-slate-300 dark:hover:bg-slate-900">
                  Şablonlar
                </button>
                <button disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={addAiDraft} className={cx('flex items-center gap-2 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2 text-xs font-black text-indigo-700 disabled:cursor-not-allowed disabled:opacity-50 dark:border-indigo-800 dark:bg-indigo-950 dark:text-indigo-200', aiUsed && 'ai-glow')}>
                  <Icon icon={Sparkles} size={15} />
                  AI Taslak
                </button>
              </div>
              <div className="flex items-center gap-2">
                <select disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} value={action} onChange={(event) => handleActionChange(event.target.value)} className="h-9 rounded-lg border border-slate-200 bg-white px-3 text-xs font-bold text-slate-600 outline-none disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300">
                  <option value="">Aksiyon seç</option>
                  <option value="resolve">Çözümle ve Kapat</option>
                  <option value="escalate">Eskale Et</option>
                  <option value="forward">Gruba Yönlendir</option>
                  <option value="hold">Beklet</option>
                  <option value="link">Talebi İlişkilendir</option>
                </select>
                <button disabled={!action || readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={applyAction} className="h-9 rounded-lg bg-slate-800 px-3 text-xs font-black text-white disabled:cursor-not-allowed disabled:opacity-40 dark:bg-slate-700">Uygula</button>
                <button onClick={send} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} disabled={!draft.trim() || readOnly} className={cx('flex h-9 items-center gap-2 rounded-lg px-4 text-xs font-black text-white shadow-soft disabled:cursor-not-allowed disabled:opacity-40', mode === 'note' ? 'bg-amber-500' : 'bg-indigo-600')}>
                  <Icon icon={mode === 'note' ? Lock : Send} size={15} />
                  {mode === 'note' ? 'Not Kaydet' : 'Gönder'}
                </button>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ═══ COMPONENT: MÜŞTERİ 360° ═══

    function CryptoTools({ customer }) {
      const [txId, setTxId] = useState('');
      const [network, setNetwork] = useState('Ethereum');
      const [txResult, setTxResult] = useState(null);
      const [address, setAddress] = useState('');
      const [walletResult, setWalletResult] = useState(null);
      const networks = [
        { name: 'Ethereum', status: 'Yoğun', delay: '8-14 dk', dot: 'bg-amber-500' },
        { name: 'BSC', status: 'Normal', delay: '1-3 dk', dot: 'bg-emerald-500' },
        { name: 'Tron', status: 'Çok Yoğun', delay: '18-30 dk', dot: 'bg-red-500' },
        { name: 'Bitcoin', status: 'Yoğun', delay: '20-45 dk', dot: 'bg-amber-500' },
        { name: 'Solana', status: 'Normal', delay: '<1 dk', dot: 'bg-emerald-500' }
      ];

      const queryTx = () => {
        if (!txId.trim()) return;
        const confirmations = Math.max(1, (txId.trim().length * 7) % 128);
        const status = confirmations > 12 ? 'onaylandı' : confirmations > 4 ? 'beklemede' : 'başarısız';
        setTxResult({
          status,
          confirmations,
          fee: network === 'Bitcoin' ? '0.00018 BTC' : network === 'Tron' ? '13.4 TRX' : '0.0042 ETH',
          timestamp: new Date().toLocaleString('tr-TR')
        });
      };

      const validateWallet = () => {
        const value = address.trim();
        const valid = /^(0x[a-fA-F0-9]{40}|T[A-Za-z0-9]{33}|[13bc1][A-Za-z0-9]{25,62}|[1-9A-HJ-NP-Za-km-z]{32,44})$/.test(value);
        setWalletResult(valid ? 'Geçerli adres formatı' : 'Adres formatı geçersiz');
      };

      return (
        <div className="space-y-4 p-4">
          <div className="rounded-xl border border-slate-200 bg-white p-3 dark:border-slate-800 dark:bg-slate-950">
            <div className="mb-3 flex items-center gap-2 text-xs font-black text-slate-700 dark:text-slate-200">
              <Icon icon={Activity} size={15} />
              Blockchain Sorgulama
            </div>
            <textarea
              value={txId}
              onChange={(event) => setTxId(event.target.value)}
              rows={1}
              placeholder="TxID / Hash"
              className="mb-2 h-10 w-full resize-none rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-xs outline-none focus:border-indigo-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100"
            />
            <div className="mb-2 grid grid-cols-[1fr_auto] gap-2">
              <select value={network} onChange={(event) => setNetwork(event.target.value)} className="rounded-lg border border-slate-200 bg-white px-2 text-xs font-bold dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100">
                {['Ethereum', 'BSC', 'Tron', 'Bitcoin', 'Solana'].map(net => <option key={net}>{net}</option>)}
              </select>
              <button onClick={queryTx} className="rounded-lg bg-indigo-600 px-3 py-2 text-xs font-black text-white">Sorgula</button>
            </div>
            {txResult && (
              <div className="rounded-lg bg-slate-50 p-3 text-xs dark:bg-slate-900">
                <div className="mb-1 flex items-center justify-between">
                  <span className="text-slate-500">Durum</span>
                  <span className={cx('rounded-full px-2 py-0.5 font-bold', txResult.status === 'onaylandı' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-200' : txResult.status === 'beklemede' ? 'bg-amber-100 text-amber-700 dark:bg-amber-950 dark:text-amber-200' : 'bg-red-100 text-red-700 dark:bg-red-950 dark:text-red-200')}>{txResult.status}</span>
                </div>
                <div>Blok: <b>{txResult.confirmations}</b></div>
                <div>Ücret: <b>{txResult.fee}</b></div>
                <div>Zaman: <b>{txResult.timestamp}</b></div>
              </div>
            )}
          </div>

          <div className="rounded-xl border border-slate-200 bg-white p-3 dark:border-slate-800 dark:bg-slate-950">
            <div className="mb-3 flex items-center gap-2 text-xs font-black text-slate-700 dark:text-slate-200">
              <Icon icon={Wallet} size={15} />
              Cüzdan Doğrulama
            </div>
            <input value={address} onChange={(event) => setAddress(event.target.value)} placeholder="Cüzdan adresi" className="mb-2 h-10 w-full rounded-lg border border-slate-200 bg-slate-50 px-3 text-xs outline-none focus:border-indigo-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100" />
            <button onClick={validateWallet} className="w-full rounded-lg bg-slate-800 px-3 py-2 text-xs font-black text-white dark:bg-slate-700">Doğrula</button>
            {walletResult && (
              <div className={cx('mt-2 rounded-lg px-3 py-2 text-xs font-bold', walletResult.includes('Geçerli') ? 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-200' : 'bg-red-50 text-red-700 dark:bg-red-950 dark:text-red-200')}>
                {walletResult}
              </div>
            )}
          </div>

          <div className="rounded-xl border border-slate-200 bg-white p-3 dark:border-slate-800 dark:bg-slate-950">
            <div className="mb-3 text-xs font-black text-slate-700 dark:text-slate-200">Ağ Durum Göstergesi</div>
            <div className="space-y-2">
              {networks.map(net => (
                <div key={net.name} className="flex items-center justify-between rounded-lg bg-slate-50 px-3 py-2 text-xs dark:bg-slate-900">
                  <span className="flex items-center gap-2 font-bold text-slate-700 dark:text-slate-200"><span className={`h-2.5 w-2.5 rounded-full ${net.dot} ${net.status === 'Çok Yoğun' ? 'animate-pulse' : ''}`}></span>{net.name}</span>
                  <span className="text-slate-500 dark:text-slate-400">{net.status} · {net.delay}</span>
                </div>
              ))}
            </div>
          </div>

        </div>
      );
    }

    // ═══ COMPONENT: BİLGİ BANKASI ═══
    function KnowledgeBase({ onInsert, activeTopic, activeItem, articles = KNOWLEDGE_ARTICLES }) {
      const [query, setQuery] = useState('');
      const [sortMode, setSortMode] = useState('smart');
      const [selectedArticle, setSelectedArticle] = useState(null);
      const libraryMode = !activeItem;
      const categories = useMemo(() => [...new Set(articles.map(article => article.category))].sort((left, right) => left.localeCompare(right, 'tr')), [articles]);
      const [openCategories, setOpenCategories] = useState(() => new Set(categories.slice(0, 1)));
      const queryText = query.trim().toLocaleLowerCase('tr-TR');

      useEffect(() => {
        setOpenCategories(prev => {
          if (prev.size > 0) return prev;
          return new Set(categories.slice(0, 1));
        });
      }, [categories.join('|')]);

      const toggleCategory = (category) => {
        setOpenCategories(prev => {
          const next = new Set(prev);
          if (next.has(category)) next.delete(category);
          else next.add(category);
          return next;
        });
      };

      const matchesQuery = (article) => !queryText || getArticleText(article).includes(queryText);
      const visibleArticles = useMemo(() => {
        const rows = articles.filter(matchesQuery);
        return [...rows].sort((left, right) => {
          if (sortMode === 'az') return left.title.localeCompare(right.title, 'tr');
          return scoreKnowledgeArticle(right, { activeTopic, activeItem, query }) - scoreKnowledgeArticle(left, { activeTopic, activeItem, query }) || left.title.localeCompare(right.title, 'tr');
        });
      }, [articles, queryText, sortMode, activeTopic, activeItem?.id, activeItem?.messages?.length]);
      const groupedArticles = useMemo(() => categories.map(category => ({
        category,
        articles: articles
          .filter(article => article.category === category && matchesQuery(article))
          .sort((left, right) => left.title.localeCompare(right.title, 'tr'))
      })).filter(group => group.articles.length > 0), [articles, categories.join('|'), queryText]);

      const insertArticle = (article) => {
        if (!onInsert) return;
        onInsert(getArticleCustomerText(article), article.title);
      };

      const ArticleCard = ({ article, score = 0 }) => (
        <article onClick={() => setSelectedArticle(article)} className="cursor-pointer rounded-xl border border-slate-200 bg-white p-3 shadow-sm transition hover:border-indigo-300 hover:shadow-md dark:border-slate-800 dark:bg-slate-950 dark:hover:border-indigo-700">
          <div className="mb-2 flex items-start justify-between gap-2">
            <div className="min-w-0">
              <div className="text-xs font-black text-slate-900 dark:text-white">{article.title}</div>
              <div className="mt-1 text-[10px] font-black text-indigo-600 dark:text-indigo-300">{article.category}</div>
            </div>
            {!libraryMode && sortMode === 'smart' && score > 0 && <span className="shrink-0 rounded-full bg-indigo-100 px-2 py-0.5 text-[9px] font-black text-indigo-700 dark:bg-indigo-950 dark:text-indigo-200">Öneri</span>}
          </div>
          <div className="text-[11px] leading-5 text-slate-500 dark:text-slate-400">{article.desc}</div>
          <div className="mt-2 line-clamp-3 rounded-lg bg-slate-50 p-2 text-[11px] leading-5 text-slate-600 dark:bg-slate-900 dark:text-slate-300">{getArticleDetailText(article)}</div>
          {onInsert && (
            <button onClick={(event) => { event.stopPropagation(); insertArticle(article); }} className="mt-2 flex items-center gap-1 rounded-lg bg-indigo-600 px-2.5 py-1.5 text-[11px] font-black text-white">
              <Icon icon={Plus} size={13} />
              Konuşmaya Kopyala
            </button>
          )}
        </article>
      );

      const ArticleModal = ({ article }) => {
        if (!article) return null;
        return (
          <div className="fixed inset-0 z-[120] flex items-center justify-center bg-slate-950/60 p-4" onClick={() => setSelectedArticle(null)}>
            <div className="flex max-h-[86vh] w-full max-w-3xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl dark:bg-slate-950" onClick={(event) => event.stopPropagation()}>
              <div className="flex shrink-0 items-start justify-between gap-4 border-b border-slate-200 p-5 dark:border-slate-800">
                <div>
                  <div className="text-[10px] font-black uppercase tracking-wide text-indigo-600 dark:text-indigo-300">{article.category}</div>
                  <h3 className="mt-1 text-lg font-black text-slate-900 dark:text-white">{article.title}</h3>
                  <p className="mt-1 text-sm font-semibold text-slate-500 dark:text-slate-400">{article.desc}</p>
                </div>
                <button onClick={() => setSelectedArticle(null)} className="rounded-lg p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900">
                  <Icon icon={X} size={18} />
                </button>
              </div>
              <div className="min-h-0 flex-1 overflow-y-auto p-5 no-scrollbar">
                <section className="rounded-2xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-900">
                  <h4 className="mb-3 text-sm font-black text-slate-900 dark:text-white">Temsilci İçeriği</h4>
                  <p className="whitespace-pre-wrap text-sm font-semibold leading-7 text-slate-700 dark:text-slate-200">{getArticleDetailText(article)}</p>

            {!libraryMode && (
              <div className="grid grid-cols-2 gap-1 rounded-lg bg-slate-100 p-1 dark:bg-slate-900">
                <button onClick={() => setSortMode('smart')} className={cx('rounded-md px-2 py-1.5 text-[11px] font-black', sortMode === 'smart' ? 'bg-white text-indigo-600 shadow-sm dark:bg-slate-800 dark:text-indigo-300' : 'text-slate-500 dark:text-slate-400')}>Akıllı Sıralama</button>
                <button onClick={() => setSortMode('az')} className={cx('rounded-md px-2 py-1.5 text-[11px] font-black', sortMode === 'az' ? 'bg-white text-indigo-600 shadow-sm dark:bg-slate-800 dark:text-indigo-300' : 'text-slate-500 dark:text-slate-400')}>A-Z</button>

    const getItemChannelType = (item = {}) => {
      if (item.channel === 'live_chat') return 'live_chat';
      if (item.channel === 'social') return 'social';
      if (item.direction || item.phone) return 'phone';
      if (item.channel === 'email' || item.channel === 'webform' || item.source === 'E-posta' || item.source === 'Web Form') return 'email';
      return item.module || 'email';
    };

    const getTicketTabForType = (type) => type === 'live_chat' ? 'chat' : type;

    function TicketInfoPanel({ item, customer, agents = [], now = Date.now(), onNavigateTicket }) {
      const [copied, setCopied] = useState(false);
      if (!item) return <div className="p-4 text-sm font-bold text-slate-400">Talep seçili değil.</div>;
      const type = getItemChannelType(item);
      const tab = getTicketTabForType(type);
      const owner = agents.find(agent => agent.id === item.assignedTo);
      const status = ticketStatusMeta[item.status] || ticketStatusMeta.active;
      const sla = getSlaInfo(item, type, now);
      const createdAt = item.createdAt ? new Date(item.createdAt).toLocaleString('tr-TR') : '-';
      const connectedAt = item.connectedAt || item.startedAt || item.createdAt;
      const elapsedSeconds = connectedAt ? Math.max(0, Math.floor((now - connectedAt) / 1000)) : 0;
      const link = `${window.location.href.split('#')[0]}#ticket=${tab}:${item.id}`;
      const infoRows = [
        ['Talep ID', item.id],
        ['Kanal', channelLabels[type] || item.source || item.channel || 'Talep'],
        ['Kaynak', item.platform ? `${item.platform} · ${item.type}` : item.source || item.direction || '-'],
        ['Durum', status.label],
        ['Öncelik', item.priority || '-'],
        ['Kategori', item.category || item.topic || '-'],
        ['Konu', item.subject || item.body || '-'],
        ['Atanan', owner?.name || 'Atanmamış'],
        ['Oluşturma', createdAt],
        ['Bağlı / Açık Süre', formatDuration(elapsedSeconds)],
        ['SLA', sla.detail || sla.label],
        ['Müşteri', `${customer.name} · ${customer.userId}`]
      ];
      const copyLink = async () => {
        try {
          await navigator.clipboard?.writeText(link);
          setCopied(true);
          window.setTimeout(() => setCopied(false), 1400);
        } catch (error) {
          setCopied(false);
        }
      };
      return (
        <div className="space-y-4 p-4">

              <span className={`rounded-full px-2 py-1 text-[10px] font-black ${status.badge}`}>{status.label}</span>
            </div>
            <div className="space-y-2">
              {infoRows.map(([label, value]) => (
                <div key={label} className="rounded-lg bg-slate-50 px-3 py-2 dark:bg-slate-900">
                  <div className="text-[10px] font-black uppercase text-slate-400">{label}</div>
                  <div className="mt-0.5 break-words text-xs font-bold text-slate-800 dark:text-slate-100">{value}</div>
                </div>
              ))}
            </div>
          </div>

            <div className="mb-2 text-xs font-black text-indigo-800 dark:text-indigo-200">Kopyalanabilir Talep Linki</div>
            <div className="rounded-lg bg-white p-2 text-[11px] font-bold text-slate-600 break-all dark:bg-slate-950 dark:text-slate-300">{link}</div>
            <button onClick={copyLink} className="mt-2 flex w-full items-center justify-center gap-2 rounded-lg bg-indigo-600 px-3 py-2 text-xs font-black text-white">
              <Icon icon={Copy} size={14} />
              {copied ? 'Kopyalandı' : 'Linki Kopyala'}
            </button>
          </div>

          <div className="rounded-xl border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-950">
            <div className="mb-2 flex items-center gap-2 text-xs font-black text-slate-700 dark:text-slate-200"><Icon icon={Link} size={14} />İlişkili Talepler</div>
            {item.linkedTickets?.length ? (
              <div className="space-y-2">
                {item.linkedTickets.map(linked => (
                  <button
                    key={`${linked.tab || linked.module}-${linked.id}`}
                    onClick={() => linked.tab !== 'history' && onNavigateTicket?.(linked)}
                    disabled={linked.tab === 'history'}
                    className="block w-full rounded-lg border border-slate-200 p-2 text-left text-xs transition hover:border-indigo-200 hover:bg-indigo-50 disabled:cursor-default disabled:hover:bg-white dark:border-slate-800 dark:hover:border-indigo-800 dark:hover:bg-indigo-950/25 dark:disabled:hover:bg-slate-950"
                  >
                    <div className="font-black text-slate-900 dark:text-white">{linked.source || linked.module} #{linked.id}</div>
                    <div className="mt-0.5 truncate font-semibold text-slate-500 dark:text-slate-400">{linked.subject}</div>
                  </button>
                ))}
              </div>
            ) : (
              <div className="rounded-lg bg-slate-50 px-3 py-2 text-xs font-bold text-slate-500 dark:bg-slate-900 dark:text-slate-400">Henüz ilişkili kayıt yok.</div>
            )}
          </div>
        </div>

    // ═══ COMPONENT: E-POSTA MAIL İSTEMCİSİ ═══
    function EmailMessageCard({ message, customerName, agentName = 'Engin Can K.' }) {
      const [expanded, setExpanded] = useState(false);
      const isAgent = message.sender === 'agent';
      const isNote = message.sender === 'note';
      const isSupervisor = message.sender === 'supervisor';
      const noteAuthor = message.agentName || message.author || message.by || agentName;
      const senderName = isSupervisor ? 'Süpervizör Fısıltısı' : isAgent ? agentName : isNote ? `İç Not · ${noteAuthor}` : customerName;
      const avatar = isSupervisor ? 'SF' : isAgent ? getInitials(agentName) : isNote ? (message.agentAvatar || getInitials(noteAuthor)) : getInitials(senderName);
      const renderBody = (text) => text.split('\n').map((line, index) => {
        if (line.trim().startsWith('>')) {
          return <div key={index} className="my-2 border-l-2 border-indigo-400 bg-indigo-50/30 px-3 py-2 text-xs italic text-slate-500 dark:bg-indigo-950/20 dark:text-slate-300">{line.replace(/^>\s?/, '')}</div>;
        }
        return <div key={index}>{line || '\u00A0'}</div>;
      });

      return (
        <div className={cx('rounded-xl border p-4 shadow-sm', isNote || isSupervisor ? 'border-amber-200 bg-amber-50 dark:border-amber-800 dark:bg-amber-950/30' : 'border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900')}>
          <div className="mb-3 flex items-start justify-between gap-3">
            <div className="flex items-start gap-3">
              <div className={cx('flex h-9 w-9 items-center justify-center rounded-full text-xs font-black', isAgent ? 'bg-indigo-600 text-white' : isNote ? 'bg-amber-500 text-white' : 'bg-slate-200 text-slate-700 dark:bg-slate-800 dark:text-slate-200')}>{avatar}</div>

                    <select disabled={readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} value={action} onChange={(event) => handleActionChange(event.target.value)} className="h-9 rounded-lg border border-slate-200 bg-white px-3 text-xs font-bold text-slate-600 outline-none disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-300">
                      <option value="">Aksiyon seç</option>
                      <option value="resolve">Çözümle ve Kapat</option>
                      <option value="escalate">Eskale Et</option>
                      <option value="forward">Gruba Yönlendir</option>
                      <option value="hold">Beklet</option>
                      <option value="link">Talebi İlişkilendir</option>
                    </select>
	                  <button disabled={!action || readOnly} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} onClick={applyAction} className="h-9 rounded-lg bg-slate-800 px-3 text-xs font-black text-white disabled:opacity-40">Uygula</button>
	                    <button onClick={sendMail} title={readOnly ? 'İzleme modunda düzenleme yapamazsınız' : ''} disabled={!draft.trim() || readOnly} className="flex h-9 items-center gap-2 rounded-lg bg-indigo-600 px-4 text-xs font-black text-white disabled:opacity-40"><Icon icon={Send} size={14} />Gönder</button>

          </section>

          <ToolsPanel
            customer={customer}
            onInsertKnowledge={(text, title) => { setExternalInsert({ id: generateId('kb-email'), text }); addAudit('Bilgi bankası e-postaya eklendi', item.id, 'email', title); }}
            activeTopic={item.topic}
            openTickets={getOpenTicketsForCustomer(customer.id)}
            recentTickets={getRecentTicketsForCustomer(customer.id)}
            onNavigateTicket={onNavigateTicket}
            onRequestBalance={onRequestBalance}
            balanceApproved={Boolean(balanceApprovals[customer.id])}
            onPrefillFromHistory={(text) => setExternalInsert({ id: generateId('history-email'), text })}
            activeItem={item}
            onOpenCustomerTab={onOpenCustomerTab}
            agents={agents}
            now={now}
            knowledgeArticles={knowledgeArticles}
          />

    }

    function ChannelWorkspace({
      items,
      setItems,
      activeId,
      setActiveId,
      type,
      now,
      openTemplateModal,
      openResolve,
      openEscalate,
      openForward,
      openHold,
      openLink,
      openQuickAction,
      addAudit,
      getOpenTicketsForCustomer,
      getRecentTicketsForCustomer,
      onNavigateTicket,
      onRequestBalance,
      balanceApprovals,
      currentRole,
      currentAgent,
      agents = [],
      viewingAgent,
      onOpenCustomerTab,
      knowledgeArticles = KNOWLEDGE_ARTICLES
    }) {
      const [externalInsert, setExternalInsert] = useState(null);
      const [agentFilter, setAgentFilter] = useState('all');
      const [takeoverItem, setTakeoverItem] = useState(null);
      const effectiveAgentId = viewingAgent?.id || currentAgent.id;
      const monitoringMode = currentRole === 'manager' && !viewingAgent && type === 'live_chat';
      const filteredItems = items.filter(row => {
        if (viewingAgent) return row.assignedTo === viewingAgent.id;
        if (currentRole === 'agent') return row.assignedTo === currentAgent.id;
        if (agentFilter === 'mine') return row.assignedTo === currentAgent.id;
        if (agentFilter !== 'all') return row.assignedTo === Number(agentFilter);
        return true;
      });
      const item = filteredItems.find(row => row.id === activeId) || filteredItems[0] || items[0];
      const customer = getCustomer(item.customerId);
      const readOnly = Boolean(viewingAgent);
      const flags = getTicketFlags(item, type, now);
      const assignedAgent = agents.find(agent => agent.id === item.assignedTo);
      const managerFilterBar = currentRole === 'manager' && !viewingAgent ? (
        <div className="mt-3 flex flex-wrap gap-1">
          {[{ id: 'all', label: 'Tümü' }, { id: 'mine', label: 'Benim' }, ...agents.map(agent => ({ id: String(agent.id), label: agent.name }))].map(option => (
            <button key={option.id} onClick={() => setAgentFilter(option.id)} className={cx('rounded-full px-2 py-1 text-[10px] font-black', agentFilter === option.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 dark:bg-slate-900 dark:text-slate-300')}>{option.label}</button>
          ))}
        </div>
      ) : null;

      const onSendMessage = (id, text, isNote) => {
        setItems(prev => prev.map(row => {
          if (row.id !== id) return row;
          const message = {
            id: generateId(isNote ? 'note' : 'msg'),
            sender: isNote ? 'note' : 'agent',
            time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),
            text,
            ...(isNote ? { agentName: currentAgent.name, agentAvatar: currentAgent.avatar || getInitials(currentAgent.name) } : {})
          };
          return { ...row, unread: 0, sentReply: isNote ? row.sentReply : true, messages: [...row.messages, message] };
        }));
        addAudit(isNote ? 'İç not eklendi' : 'Mesaj gönderildi', id, type, text.slice(0, 80));
      };

      const insertKnowledge = (text, title) => {
        setExternalInsert({ id: generateId('kb-insert'), text });
        addAudit('Bilgi bankası konuşmaya eklendi', item.id, type, title);
      };

      const addWhisper = (text) => {
        setItems(prev => prev.map(row => row.id === item.id ? {
          ...row,
          messages: [...row.messages, { id: generateId('whisper'), sender: 'supervisor', time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }), text }]
        } : row));
        addAudit('Fısılt notu gönderildi', item.id, type, `${viewingAgent?.name || 'Temsilci'} için`);
      };

      const confirmTakeover = () => {
        if (!takeoverItem) return;
        const previousAgent = agents.find(agent => agent.id === takeoverItem.assignedTo);
        setItems(prev => prev.map(row => row.id === takeoverItem.id ? { ...row, assignedTo: currentAgent.id } : row));
        setActiveId(takeoverItem.id);
        addAudit('Talep üstlenildi', takeoverItem.id, type, `${previousAgent?.name || 'Atanmamış'} temsilcisinden ${currentAgent.name} üzerine alındı`);
        setTakeoverItem(null);
      };

      return (
        <div className="flex h-full min-w-0">
          <TicketList
            items={filteredItems}
            activeId={item.id}
            setActiveId={setActiveId}
            type={type}
            now={now}
            filterBar={managerFilterBar}
            agents={agents}
            currentRole={currentRole}
            viewingAgent={viewingAgent}
            monitoringMode={monitoringMode}
            onOpenCustomerTab={onOpenCustomerTab}
            onAssign={(id, nextAgentId) => {
              setItems(prev => prev.map(row => row.id === id ? { ...row, assignedTo: nextAgentId } : row));
              addAudit('Talep atandı', id, type, `${agents.find(agent => agent.id === nextAgentId)?.name} temsilcisine atandı`);
            }}
          />
          <ConversationPanel
            item={item}
            type={type}
            now={now}
            onSendMessage={onSendMessage}
            openTemplateModal={openTemplateModal}
            openResolve={openResolve}
            openEscalate={openEscalate}
            openForward={openForward}
            openHold={openHold}
            openLink={openLink}
            externalInsert={externalInsert}
            clearExternalInsert={() => setExternalInsert(null)}
            readOnly={readOnly}
            onWhisper={addWhisper}
            currentAgent={currentAgent}
            monitoringMode={monitoringMode}
            flags={flags}
            assignedAgent={assignedAgent}
            onTakeover={() => setTakeoverItem(item)}
            onOpenCustomerTab={onOpenCustomerTab}
            knowledgeArticles={knowledgeArticles}
          />
          <ToolsPanel
            customer={customer}
            onInsertKnowledge={insertKnowledge}
            activeTopic={item.topic}
            openTickets={getOpenTicketsForCustomer(customer.id)}
            recentTickets={getRecentTicketsForCustomer(customer.id)}
            onNavigateTicket={onNavigateTicket}
            onRequestBalance={onRequestBalance}
            balanceApproved={Boolean(balanceApprovals[customer.id])}
            onPrefillFromHistory={(text) => setExternalInsert({ id: generateId('history-prefill'), text })}
            activeItem={item}
            onOpenCustomerTab={onOpenCustomerTab}
            agents={agents}
            now={now}
            knowledgeArticles={knowledgeArticles}
          />
          {takeoverItem && <TakeoverModal item={takeoverItem} agents={agents} currentAgent={currentAgent} onClose={() => setTakeoverItem(null)} onConfirm={confirmTakeover} />}
        </div>
      );
    }

    function PlatformIcon({ platform }) {
      const icon = platform === 'Instagram' ? Instagram : platform === 'Facebook' ? Facebook : platform === 'Şikayetvar' ? Megaphone : platform === 'LinkedIn' ? Globe2 : Twitter;
      return <Icon icon={icon} size={16} />;
    }

    function SocialModule({
      items,
      setItems,
      activeId,
      setActiveId,
      now,
      openResolve,
      openEscalate,
      openForward,
      openHold,
      openLink,
      openQuickAction,
      openTemplateModal,
      addAudit,
      getOpenTicketsForCustomer,
      getRecentTicketsForCustomer,
      onNavigateTicket,
      onRequestBalance,

      const [platformFilter, setPlatformFilter] = useState('Tümü');

      const [draft, setDraft] = useState('');
      const [action, setAction] = useState('');
      const [externalInsert, setExternalInsert] = useState(null);
      const [whisperOpen, setWhisperOpen] = useState(false);
      const [whisperText, setWhisperText] = useState('');
      const platforms = ['Tümü', 'Twitter', 'Instagram', 'Facebook', 'Şikayetvar', 'LinkedIn'];
      const effectiveAgentId = viewingAgent?.id || currentAgent.id;
      const readOnly = Boolean(viewingAgent);
      const roleItems = items.filter(item => {
        if (viewingAgent) return item.assignedTo === viewingAgent.id;
        if (currentRole === 'agent') return item.assignedTo === currentAgent.id;
        if (agentFilter === 'mine') return item.assignedTo === currentAgent.id;
        if (agentFilter !== 'all') return item.assignedTo === Number(agentFilter);
        return true;
      });
      const filtered = platformFilter === 'Tümü' ? roleItems : roleItems.filter(item => item.platform === platformFilter);
      const active = filtered.find(item => item.id === activeId) || filtered[0] || roleItems[0] || items[0];
      const customer = getCustomer(active.customerId);
      const linkedTickets = active.linkedTickets || [];

      useEffect(() => {
        if (externalInsert?.id) {
          setDraft(prev => `${prev}${prev ? '\n\n' : ''}${externalInsert.text}`);
          setExternalInsert(null);
        }
      }, [externalInsert]);

      const sendSocial = () => {
        if (readOnly) return;
        if (!draft.trim()) return;
        setItems(prev => prev.map(row => row.id === active.id ? {
          ...row,
          unread: 0,
          sentReply: true,
          messages: [...row.messages, { id: generateId('socmsg'), sender: 'agent', time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }), text: draft.trim() }]
        } : row));
        addAudit('Sosyal medya yanıtı gönderildi', active.id, 'social', draft.slice(0, 80));
        setDraft('');
      };

      const applyAction = () => {
        if (readOnly) return;
        if (action === 'resolve') openResolve(active, 'social');
        if (action === 'contact') {
          const contactDraft = active.visibility === 'public'
            ? 'Merhaba, bizimle iletişime geçtiğiniz için teşekkür ederiz. Hesap güvenliğiniz nedeniyle sosyal medya üzerinden işlem detayı paylaşamıyoruz. Size telefon veya kayıtlı e-posta kanalınız üzerinden dönüş yapabilmemiz için ad soyad, kullanıcı ID ve güncel telefon/e-posta bilginizi özel mesajla paylaşmanızı rica ederiz.'
            : 'Merhaba, bizimle iletişime geçtiğiniz için teşekkür ederiz. Hesap güvenliğiniz nedeniyle sosyal medya üzerinden işlem detayı paylaşamıyoruz. Size telefon veya kayıtlı e-posta kanalınız üzerinden dönüş yapabilmemiz için ad soyad, kullanıcı ID ve güncel telefon/e-posta bilginizi bu DM üzerinden paylaşmanızı rica ederiz.';
          setDraft(contactDraft);
          setItems(prev => prev.map(row => row.id === active.id ? { ...row, status: 'hold', unread: 0, contactRequested: true, holdReason: 'Sosyal medya üzerinden hesap detayı paylaşılamadığı için iletişim bilgisi bekleniyor.', holdFollowUp: 'Telefon/e-posta dönüş kanalı teyidi', holdAgent: currentAgent.name, holdStartedAt: Date.now() } : row));
          addAudit('Sosyal medya iletişim bilgisi istendi', active.id, 'social', 'Sosyal medya kaydı telefon/e-posta dönüşü için beklemeye alındı');
        }
        if (action === 'link') {
          openLink?.(active, 'social');
        }
        if (action === 'forward') openForward(active, 'social');
        if (action === 'hold') openHold(active, 'social');
        setAction('');
      };

      const handleActionChange = (value) => {
        if (value === 'link' && !readOnly) {
          openLink?.(active, 'social');
          setAction('');
          return;
        }
        setAction(value);
      };

      const sendWhisper = () => {
        if (!whisperText.trim()) return;
        setItems(prev => prev.map(row => row.id === active.id ? {
          ...row,
          messages: [...row.messages, { id: generateId('whisper'), sender: 'supervisor', time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }), text: whisperText.trim() }]
        } : row));
        addAudit('Fısılt notu gönderildi', active.id, 'social', `${viewingAgent?.name || 'Temsilci'} için`);
        setWhisperText('');
        setWhisperOpen(false);
      };

      return (
        <div className="flex h-full min-w-0">
          <section className="w-80 shrink-0 border-r border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-950">

              <div className="mb-3 flex items-center gap-2 text-sm font-black text-slate-900 dark:text-white">
                <Icon icon={Filter} size={16} />

                {platforms.map(platform => (

                ))}
              </div>
              {currentRole === 'manager' && !viewingAgent && (
                <div className="mt-3 flex flex-wrap gap-1">
                  {[{ id: 'all', label: 'Tümü' }, { id: 'mine', label: 'Benim' }, ...agents.map(agent => ({ id: String(agent.id), label: agent.name }))].map(option => (
                    <button key={option.id} onClick={() => setAgentFilter(option.id)} className={cx('rounded-full px-2 py-1 text-[10px] font-black', agentFilter === option.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 dark:bg-slate-900 dark:text-slate-300')}>{option.label}</button>
                  ))}
                </div>
              )}
            </div>
            <div className="h-[calc(100vh-15rem)] overflow-y-auto no-scrollbar">
              {filtered.map(item => {
                const customerRow = getCustomer(item.customerId);
                return (
                  <button key={item.id} onClick={() => setActiveId(item.id)} className={cx('block w-full border-b border-l-4 p-3 text-left transition dark:border-b-slate-900', statusColors[item.status], active.id === item.id ? 'bg-indigo-50 dark:bg-indigo-950/35' : 'hover:bg-slate-50 dark:hover:bg-slate-900/80')}>
                    <div className="mb-2 flex items-center justify-between gap-2">
                      <span className="flex min-w-0 items-center gap-2 text-sm font-black text-slate-900 dark:text-white"><PlatformIcon platform={item.platform} /><span data-customer-tab={customerRow.id} onClick={(event) => { event.stopPropagation(); onOpenCustomerTab?.(customerRow.id); }} className="truncate underline-offset-2 hover:text-indigo-600 hover:underline dark:hover:text-indigo-300">{maskName(customerRow.name)}</span><CustomerTierBadge customer={customerRow} /></span>
                      {item.unread > 0 && <span className="rounded-full bg-red-600 px-2 py-0.5 text-[10px] font-black text-white">{item.unread}</span>}
                    </div>
                    <div className="mb-2 flex items-center justify-between">
                      <span className="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-bold text-slate-600 dark:bg-slate-900 dark:text-slate-300">{item.type}</span>
                      <PriorityBadge priority={item.priority} />
                    </div>
                    <div className="mb-2 flex justify-end"><SlaBadge item={item} type="social" now={now} /></div>
                    <div className="truncate text-xs font-bold text-slate-800 dark:text-slate-200">{item.subject}</div>
                    <div className="mt-1 line-clamp-2 text-xs leading-5 text-slate-500 dark:text-slate-400">{item.body}</div>
                    {item.linkedTickets?.length > 0 && (
                      <div className="mt-2 inline-flex items-center gap-1 rounded-full bg-indigo-50 px-2 py-0.5 text-[10px] font-black text-indigo-700 dark:bg-indigo-950/50 dark:text-indigo-200">
                        <Icon icon={Link} size={10} />
                        {item.linkedTickets.length} ilişkili kayıt
                      </div>
                    )}
                    <div className="mt-2 text-[11px] font-bold text-slate-400">{agents.find(agent => agent.id === item.assignedTo)?.name || 'Atanmamış'}</div>
                    {currentRole === 'manager' && !viewingAgent && (
                      <select
                        value={item.assignedTo}
                        onClick={(event) => event.stopPropagation()}
                        onChange={(event) => {
                          const next = Number(event.target.value);
                          setItems(prev => prev.map(row => row.id === item.id ? { ...row, assignedTo: next } : row));
                          addAudit('Talep atandı', item.id, 'social', `${agents.find(agent => agent.id === next)?.name} temsilcisine atandı`);
                        }}
                        className="mt-2 h-7 w-full rounded-lg border border-slate-200 bg-white px-2 text-[11px] font-bold text-slate-600 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200"
                      >
                        {agents.map(agent => <option key={agent.id} value={agent.id}>Ata: {agent.name}</option>)}
                      </select>
                    )}
                  </button>
                );
              })}
            </div>
          </section>

          <section className="flex min-w-0 flex-1 flex-col bg-slate-50 dark:bg-slate-950">
            <div className="border-b border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-950">
              <div className="flex items-start justify-between">
                <div>
                  <div className="flex items-center gap-3">
                    <div className="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 text-slate-600 dark:bg-slate-900 dark:text-slate-200"><PlatformIcon platform={active.platform} /></div>
                    <div>
                      <div className="flex items-center gap-2">
                        <a href={`#customer-${customer.id}`} data-customer-tab={customer.id} className="text-left text-lg font-black text-slate-900 underline-offset-4 hover:text-indigo-600 hover:underline dark:text-white dark:hover:text-indigo-300">{customer.name}</a>
                        <CustomerTierBadge customer={customer} compact={false} />
                      </div>
                      <div className="text-sm text-slate-500 dark:text-slate-400">{active.platform} · {active.type} · {customer.social.handle}</div>
                    </div>
                  </div>
                </div>
                <SlaBadge item={active} type="social" now={now} large />
              </div>
              {active.visibility === 'private' ? (
                <div className="mt-3 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2 text-sm font-semibold text-indigo-800 dark:border-indigo-800 dark:bg-indigo-950/40 dark:text-indigo-100">Bu yanıt kamuya açık değildir.</div>
              ) : (
                <div className="mt-3 rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm font-semibold text-amber-800 dark:border-amber-800 dark:bg-amber-950/50 dark:text-amber-100">Bu yanıt kamuya görünür olacak.</div>
              )}
              {linkedTickets.length > 0 && (
                <div className="mt-3 rounded-xl border border-indigo-200 bg-indigo-50 p-3 dark:border-indigo-800 dark:bg-indigo-950/35">
                  <div className="mb-2 flex items-center gap-2 text-xs font-black text-indigo-800 dark:text-indigo-200">
                    <Icon icon={Link} size={14} />
                    İlişkili Talepler
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {linkedTickets.map(link => (
                      <button
                        key={`${link.tab || link.module}-${link.id}`}
                        onClick={() => link.tab !== 'history' && onNavigateTicket?.(link)}
                        disabled={link.tab === 'history'}
                        className="rounded-lg bg-white px-3 py-2 text-left text-[11px] font-black text-indigo-700 shadow-sm disabled:cursor-default disabled:opacity-80 dark:bg-slate-950 dark:text-indigo-200"
                        title={link.tab === 'history' ? 'Geçmiş kayıt müşteri kartında görüntülenir' : 'İlişkili talebe git'}
                      >
                        {link.source} #{link.id}
                        <span className="ml-1 font-bold opacity-70">{link.subject}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>

                  <PriorityBadge priority={active.priority} />
